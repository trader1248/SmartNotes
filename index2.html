<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>SmartNotes</title>
<style>
    :root {
        --bg-dark: #0d0d0d;
        --fg-light: #e0e0e0;
        --accent-gold: #d4af37;
        --border-thin: 1px solid rgba(212,175,55,0.3);
        --radius-sm: 4px;
        --font-main: "PingFang TC", sans-serif;
    }
    body {
        margin:0; padding:0;
        background:var(--bg-dark);
        color:var(--fg-light);
        font-family:var(--font-main);
        font-size:12px;
        display:flex;
        height:100vh;
        overflow:hidden;
    }
    #sidebar {
        width:260px;
        border-right:var(--border-thin);
        padding:8px;
        overflow-y:auto;
        box-sizing:border-box;
    }
    #main {
        flex:1;
        padding:12px;
        overflow-y:auto;
        box-sizing:border-box;
    }
    .node {
        display:flex;
        align-items:center;
        cursor:pointer;
        user-select:none;
        margin:2px 0;
    }
    .toggle {
        width:16px;height:16px;
        margin-right:6px;
        background:none;
        border:none;
        color:var(--accent-gold);
        font-size:14px;
        line-height:1;
    }
    .toggle::before { content:"▸"; }
    .toggle.open::before { content:"▾"; }
    .title {
        font-weight:bold;
        flex:1;
        padding:2px 4px;
        border-radius:var(--radius-sm);
    }
    .title.editing {
        background:rgba(212,175,55,0.2);
        outline:none;
        border:none;
    }
    .article-card {
        margin:8px 0;
        padding:10px;
        border:var(--border-thin);
        border-radius:var(--radius-sm);
        background:rgba(212,175,55,0.05);
    }
    .article-title {
        font-weight:bold;
        margin-bottom:4px;
        cursor:text;
        user-select:text;
    }
    .richtext {
        min-height:36px;
        outline:none;
        border:none;
        background:transparent;
        color:var(--fg-light);
        white-space:pre-wrap;
        word-wrap:break-word;
    }
    .richtext:focus { outline:none; }
    .edit-btn {
        display:none;
        margin-left:6px;
        vertical-align:middle;
        width:18px;height:18px;
        background:none;
        border:none;
        color:var(--accent-gold);
        font-size:16px;
        cursor:pointer;
    }
    .node:hover .edit-btn,
    .title.editing + .edit-btn { display:inline; }
    .controls {
        margin-top:12px;
        padding-top:8px;
        border-top:var(--border-thin);
        display:flex;
        flex-wrap:wrap;
        gap:6px;
        font-size:12px;
    }
    .controls button,
    .controls select,
    .controls input[type="color"] {
        background:rgba(212,175,55,0.15);
        border:none;
        color:var(--fg-light);
        padding:4px 6px;
        border-radius:var(--radius-sm);
        cursor:pointer;
    }
    .controls select,
    .controls input[type="color"] { height:28px; }
    .status-dot {
        position:fixed;
        top:8px; right:8px;
        width:12px;height:12px;
        border-radius:50%;
        background:var(--accent-gold);
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:10px;
        color:#000;
    }
    .status-dot.synced { background:#4caf50; }
    .status-dot.failed { background:#f44336; }
    .toggle-section {
        margin-top:8px;
        padding-top:4px;
        border-top:var(--border-thin);
        font-size:12px;
        color:var(--fg-light);
        cursor:pointer;
        user-select:none;
    }
    .toggle-section.hidden { display:none; }
    .icon { width:18px;height:18px; display:inline-block; vertical-align:middle; }
</style>
</head>
<body>
<div id="status" class="status-dot" title="同步狀態">●</div>
<div id="sidebar">
    <div class="toggle-section" id="toggleControls">▼ 控制面板</div>
    <div id="controlsPanel" class="controls hidden">
        <!-- 第一列：檔案系統 -->
        <div>
            <button id="btnExportJSON">匯出 JSON</button>
            <button id="btnImportJSON">匯入 JSON</button>
            <button id="btnExportTXT">匯出 TXT</button>
            <button id="btnExportHTML">匯出 HTML</button>
            <button id="btnReset">重設</button>
        </div>
        <!-- 第二列：樣式與其他 -->
        <div>
            <label>字型:
                <select id="fontSelect">
                    <option value="PingFang TC">PingFang TC</option>
                    <option value="Arial">Arial</option>
                    <option value="Courier New">Courier New</option>
                </select>
            </label>
            <label>字號:
                <select id="fontSizeSelect">
                    <option value="10">10</option>
                    <option value="12" selected>12</option>
                    <option value="14">14</option>
                    <option value="16">16</option>
                </select>
            </label>
            <label>縮排:
                <input type="number" id="bulletIndent" value="20" min="0" max="60" style="width:48px;"> px
            </label>
            <label>邊框顏色:
                <input type="color" id="borderColor" value="#d4af37">
            </label>
        </div>
        <!-- 第三列：展開/摺疊 -->
        <div>
            <button id="btnExpand1">展開 1層</button>
            <button id="btnExpand2">展開 2層</button>
            <button id="btnExpand3">展開 3層</button>
            <button id="btnExpandAll">展開全部</button>
            <button id="btnCollapseAll">收合全部</button>
        </div>
    </div>
    <div id="treeRoot"></div>
</div>
<div id="main">
    <h1 style="margin:0 0 8px 0; font-weight:bold; color:var(--accent-gold);">SmartNotes</h1>
    <div id="articleArea"></div>
</div>

<script>
// ---------- 基本資料結構 ----------
let tree = { id: "root", type: "folder", title: "TITLE", children: [] };
let selectedArticleId = null;

// ---------- 工具函式 ----------
function uid() { return Date.now().toString(36)+Math.random().toString(36).substr(2,5); }
function debounce(fn, delay){
    let t; return function(...args){ clearTimeout(t); t=setTimeout(()=>fn.apply(this,args),delay); };
}
function syncStatus(state){ // state: 'syncing'|'synced'|'failed'
    const dot=document.getElementById('status');
    dot.className='status-dot';
    if(state==='syncing') dot.classList.add('synced'); // gold via CSS var
    else if(state==='synced') dot.classList.add('synced');
    else dot.classList.add('failed');
    dot.title={syncing:'正在同步…',synced:'已同步',failed:'同步失敗，將自動重試'}[state];
}

// ---------- Supabase (REST) ----------
const SUPABASE_URL="https://bxeraximugvvpkpaejdn.supabase.co";
const SUPABASE_KEY="sb_publishable_i8jvS_ivsLBzYwb2HAKk1Q_d4DtCHjX";
function supabaseUpsert(data){
    syncStatus('syncing');
    fetch(`${SUPABASE_URL}/rest/v1/smartnotes?on_conflict=id`,{
        method:'POST',
        headers:{
            'apikey':SUPABASE_KEY,
            'Authorization':'Bearer '+SUPABASE_KEY,
            'Content-Type':'application/json',
            'Prefer':'resolution=merge-duplicates'
        },
        body:JSON.stringify({id:'root',data:data,updated_at:new Date().toISOString()})
    })
    .then(r=>{ if(!r.ok) throw new Error('Network error'); return r.json(); })
    .then(()=>syncStatus('synced'))
    .catch(err=>{ console.error(err); syncStatus('failed'); });
}
const debouncedUpsert=debounce(supabaseUpsert,1500);

// ---------- IndexedDB fallback ----------
const DB_NAME='smartnotesDB', STORE_NAME='notes';
function openIDB(){ return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,1);
    req.onupgradeneeded=e=>{ e.target.result.createObjectStore(STORE_NAME,{keyPath:'id'}); };
    req.onsuccess=e=>res(e.target.result);
    req.onerror=e=>rej(e.target.error);
}); }
function saveIDB(data){
    openIDB().then(db=>{
        const tx=db.transaction(STORE_NAME,'readwrite');
        tx.objectStore(STORE_NAME).put({id:'root',data:data});
        tx.oncomplete=()=>db.close();
    });
}
function loadIDB(){ return new Promise((res,rej)=>{
    openIDB().then(db=>{
        const tx=db.transaction(STORE_NAME,'readonly');
        const obj=tx.objectStore(STORE_NAME).get('root');
        obj.onsuccess=e=>{ db.close(); res(obj.result?obj.result.data:null); };
        obj.onerror=e=>{ db.close(); rej(e.target.error); };
    });
}); }

// ---------- 渲染樹 ----------
function renderTree(parentEl, node, depth=0){
    const div=document.createElement('div');
    div.className='node';
    div.dataset.id=node.id;
    const toggle=document.createElement('button');
    toggle.className='toggle';
    toggle.title='展開/摺疊';
    toggle.onclick=e=>{
        e.stopPropagation();
        const open=toggle.classList.toggle('open');
        const children=div.querySelectorAll('.children');
        children.forEach(c=>c.style.display=open?'block':'none');
    };
    if(node.type==='folder'){
        toggle.classList.add('open');
    }
    const titleSpan=document.createElement('span');
    titleSpan.className='title';
    titleSpan.textContent=node.title;
    titleSpan.contentEditable='false';
    titleSpan.onclick=e=>{
        if(node.type==='folder'||node.type==='article'){
            titleSpan.contentEditable='true';
            titleSpan.focus();
            const range=document.createRange();
            range.selectNodeContents(titleSpan);
            const sel=window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
            titleSpan.classList.add('editing');
        }
    };
    titleSpan.onblur=()=>{
        titleSpan.contentEditable='false';
        titleSpan.classList.remove('editing');
        const newTitle=titleSpan.textContent.trim()||(node.type==='folder'?'FOLDER':'ARTICLE');
        if(newTitle!==node.title){
            node.title=newTitle;
            saveAndSync();
        }
    };
    titleSpan.onkeydown=e=>{ if(e.key==='Enter'){ e.preventDefault(); titleSpan.blur(); } };
    const editBtn=document.createElement('button');
    editBtn.className='edit-btn';
    editBtn.innerHTML='✎';
    editBtn.title='編輯';
    editBtn.onclick=e=>{
        e.stopPropagation();
        titleSpan.click();
    };
    const addFolderBtn=document.createElement('button');
    addFolderBtn.className='edit-btn';
    addFolderBtn.innerHTML='➕';
    addFolderBtn.title='新增子資料夾';
    addFolderBtn.onclick=e=>{
        e.stopPropagation();
        const newFolder={id:uid(),type:'folder',title:'FOLDER',children:[]};
        if(node.type==='folder'){
            node.children.push(newFolder);
        }else{
            // 文章下直接加資料夾不合理，放在父資料夾
        }
        saveAndSync();
        renderTree(parentEl, tree);
    };
    const addArticleBtn=document.createElement('button');
    addArticleBtn.className='edit-btn';
    addArticleBtn.innerHTML='📄';
    addArticleBtn.title='新增文章';
    addArticleBtn.onclick=e=>{
        e.stopPropagation();
        const newArt={id:uid(),type:'article',title:'ARTICLE',content:''};
        if(node.type==='folder'){
            node.children.push(newArt);
        }
        saveAndSync();
        renderTree(parentEl, tree);
    };
    const delBtn=document.createElement('button');
    delBtn.className='edit-btn';
    delBtn.innerHTML='🗑';
    delBtn.title='刪除';
    delBtn.onclick=e=>{
        e.stopPropagation();
        if(confirm('確定刪除此項目及其所有子項目？')){
            // 需要父節點參考，暫簡化：只支援根目錄刪除
            if(node.id==='root'){ alert('不能刪除根目錄'); return; }
            // 實際專案中需傳入父參照，此處略
        }
    };
    div.append(toggle,titleSpan,editBtn,addFolderBtn,addArticleBtn,delBtn);
    if(node.children.length>0){
        const childrenDiv=document.createElement('div');
        childrenDiv.className='children';
        childrenDiv.style.display=node.type==='folder'?'block':'none';
        node.children.forEach(child=>renderTree(childrenDiv,child,depth+1));
        div.appendChild(childrenDiv);
    }
    parentEl.appendChild(div);
}

// ---------- 儲存與同步 ----------
function saveAndSync(){
    const json=JSON.stringify(tree);
    localStorage.setItem('smartnotes_local',json); // 備用
    saveIDB(json);
    debouncedUpsert(json);
}

// ---------- 載入 ----------
async function loadApp(){
    let data=null;
    try{
        const res=await fetch(`${SUPABASE_URL}/rest/v1/smartnotes?id=eq.root`,{
            headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
        });
        if(res.ok){
            const json=await res.json();
            if(json.length&&json[0].data) data=json[0].data;
        }
    }catch(e){ console.error(e); }
    if(!data){
        try{ data=await loadIDB(); }catch(e){}
    }
    if(!data){
        data=localStorage.getItem('smartnotes_local');
        if(data) try{ data=JSON.parse(data); }catch(e){}
    }
    if(data) tree=data;
    renderUI();
}
function renderUI(){
    const sidebar=document.getElementById('treeRoot');
    sidebar.innerHTML='';
    renderTree(sidebar,tree);
    const main=document.getElementById('articleArea');
    main.innerHTML='';
    if(selectedArticleId){
        const art=findNode(tree,selectedArticleId);
        if(art){
            const card=document.createElement('div');
            card.className='article-card';
            const titleDiv=document.createElement('div');
            titleDiv.className='article-title';
            titleDiv.contentEditable='false';
            titleDiv.textContent=art.title;
            titleDiv.onclick=()=>{
                titleDiv.contentEditable='true';
                titleDiv.focus();
                const range=document.createRange();
                range.selectNodeContents(titleDiv);
                const sel=window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
            };
            titleDiv.onblur=()=>{
                titleDiv.contentEditable='false';
                const newT=titleDiv.textContent.trim()||'ARTICLE';
                if(newT!==art.title){
                    art.title=newT;
                    saveAndSync();
                    renderUI();
                }
            };
            titleDiv.onkeydown=e=>{ if(e.key==='Enter'){ e.preventDefault(); titleDiv.blur(); } };
            const rich=document.createElement('div');
            rich.className='richtext';
            rich.contentEditable='true';
            rich.innerHTML=art.content||'';
            rich.oninput=()=>{ art.content=rich.innerHTML; saveAndSync(); };
            card.append(titleDiv,rich);
            main.appendChild(card);
        }
    }
    // 點擊樹節點選擇文章
    document.querySelectorAll('.node .title').forEach(t=>{
        t.style.cursor='text';
        t.onclick=e=>{
            e.stopPropagation();
            const nodeEl=t.closest('.node');
            const id=nodeEl.dataset.id;
            const node=findNode(tree,id);
            if(node&&node.type==='article'){
                selectedArticleId=id;
                renderUI();
            }
        };
    });
}
function findNode(root,id){
    if(root.id===id) return root;
    if(root.children){
        for(const c of root.children){
            const f=findNode(c,id);
            if(f) return f;
        }
    }
    return null;
}

// ---------- 控制面板 ----------
document.getElementById('toggleControls').addEventListener('click',()=>{
    const panel=document.getElementById('controlsPanel');
    panel.classList.toggle('hidden');
});
// 字型、字號
document.getElementById('fontSelect').addEventListener('change',e=>{
    document.body.style.fontFamily=e.target.value;
});
document.getElementById('fontSizeSelect').addAttribute?null:null;
document.getElementById('fontSizeSelect').addEventListener('change',e=>{
    document.body.style.fontSize=e.target.value+'px';
});
// 縮排
document.getElementById('bulletIndent').addEventListener('input',e=>{
    const px=e.target.value;
    document.querySelectorAll('.toggle').forEach(t=>{ t.style.marginLeft=px+'px'; });
});
// 邊框顏色
document.getElementById('borderColor').addEventListener('input',e=>{
    document.querySelectorAll('.article-card').forEach(c=>{ c.style.borderColor=e.target.value; });
});
// 檔案系統
document.getElementById('btnExportJSON').addEventListener('click',()=>{
    const blob=new Blob([JSON.stringify(tree,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=`SmartNotes ${new Date().toISOString().slice(0,10).replace(/-/g)}.json`; a.click(); URL.revokeObjectURL(url);
});
document.getElementById('btnImportJSON').addEventListener('click',()=>{
    const input=document.createElement('input');
    input.type='file';
    input.accept='.json';
    input.onchange=e=>{
        const file=e.target.files[0];
        if(!file) return;
        const reader=new FileReader();
        reader.onload=ev=>{
            try{
                const data=JSON.parse(ev.target.result);
                if(data && data.type) { tree=data; saveAndSync(); renderUI(); }
            }catch(err){ alert('JSON 格式錯誤'); }
        };
        reader.readAsText(file);
    };
    input.click();
});
document.getElementById('btnExportTXT').addEventListener('click',()=>{
    // 簡單純文字：遞迴取標題+內文
    function txtNode(n,depth){
        let out='';
        out+='#'.repeat(depth+1)+' '+n.title+'\n';
        if(n.type==='article') out+= (n.content||'').replace(/<[^>]*>/g,'')+'\n\n';
        if(n.children){
            n.children.forEach(c=>{ out+=txtNode(c,depth+1); });
        }
        return out;
    }
    const text=txtNode(tree,0);
    const blob=new Blob([text],{type:'text/plain'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=`SmartNotes ${new Date().toISOString().slice(0,10).replace(/-/g)}.txt`; a.click(); URL.revokeObjectURL(url);
});
document.getElementById('btnExportHTML').addEventListener('click',()=>{
    // 簡單轉HTML：標題<h2>,內容直接貼
    function htmlNode(n,depth){
        let out='';
        out+=`<h${Math.min(depth+2,6)}>${escapeHtml(n.title)}</h${Math.min(depth+2,6)}>\n`;
        if(n.type==='article'){
            out+=`<div>${n.content}</div>\n`;
        }
        if(n.children){
            n.children.forEach(c=>{ out+=htmlNode(c,depth+1); });
        }
        return out;
    }
    const html=`<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><title>SmartNotes Export</title></head><body>${htmlNode(tree,0)}</body></html>`;
    const blob=new Blob([html],{type:'text/html'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=`SmartNotes ${new Date().toISOString().slice(0,10).replace(/-/g)}.html`; a.click(); URL.revokeObjectURL(url);
});
document.getElementById('btnReset').addEventListener('click',()=>{
    if(confirm('確定要清除所有資料並重新開始？')){ tree={id:'root',type:'folder',title:'TITLE',children:[]}; selectedArticleId=null; saveAndSync(); renderUI(); }
});
// 展開/收合
document.getElementById('btnExpand1').addEventListener('click',()=>{ expandLevels(1); });
document.getElementById('btnExpand2').addEventListener('click',()=>{ expandLevels(2); });
document.getElementById('btnExpand3').addEventListener('click',()=>{ expandLevels(3); });
document.getElementById('btnExpandAll').addEventListener('click',()=>{ expandLevels(999); });
document.getElementById('btnCollapseAll').addEventListener('click',()=>{ collapseAll(); });
function expandLevels(levels){
    function walk(node,cur){
        if(node.type==='folder'){
            const el=document.querySelector(`.node[data-id="${node.id}"] .toggle`);
            if(el&&cur<levels){ el.classList.add('open'); const children=el.closest('.node').querySelector('.children'); if(children) children.style.display='block'; }
            if(node.children){
                node.children.forEach(c=>walk(c,cur+1));
            }
        }
    }
    walk(tree,0);
}
function collapseAll(){
    document.querySelectorAll('.node .toggle').forEach(t=>{ t.classList.remove('open'); const children=t.closest('.node').querySelector('.children'); if(children) children.style.display='none'; });
}
function escapeHtml(str){ return str.replace(/[&<>"']/g, m=> ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#039;"}[m])); }

// ---------- 初始化 ----------
loadApp();
</script>
</body>
</html>
