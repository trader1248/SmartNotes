<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartNotes</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{
  --bg:#14120c;
  --gold:#c9a227;
  --gold-soft:rgba(201,162,39,.45);
  --gold-faint:rgba(201,162,39,.18);
  --ink:#e8e2d0;
  --dim:#8d8468;
  --card:#1a1710;
  --indent:18px;
  --fs:12px;
  --font:"PingFang TC","-apple-system",sans-serif;
  --border:#c9a227;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:var(--font);font-size:var(--fs);line-height:1.35}
body{padding:10px 14px 120px 14px}

/* header */
#hdr{display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--gold-soft);padding-bottom:6px;margin-bottom:8px}
#hdr h1{font-size:15px;font-weight:700;letter-spacing:2px;color:var(--gold)}
#dot{width:8px;height:8px;border-radius:50%;margin-left:auto;background:#555;transition:background .3s,box-shadow .3s}
#dot.gold{background:var(--gold);box-shadow:0 0 6px var(--gold)}
#dot.green{background:#4fc36b;box-shadow:0 0 6px #4fc36b}
#dot.red{background:#e05252;box-shadow:0 0 6px #e05252}
#ctlToggle{background:none;border:1px solid var(--gold-faint);color:var(--gold);border-radius:4px;font-size:11px;padding:1px 7px;cursor:pointer}
#ctlToggle:hover{border-color:var(--gold)}

/* tree */
#tree{text-align:left}
.node{position:relative}
.row{display:flex;align-items:center;gap:5px;padding:1px 0;border-radius:4px}
.row:hover{background:rgba(201,162,39,.06)}
.kids{margin-left:var(--indent);border-left:1px solid var(--gold-faint);padding-left:6px}
.hidden{display:none}

/* halo toggle bullet */
.tg{flex:0 0 auto;width:16px;height:16px;border:none;background:none;cursor:pointer;position:relative;display:inline-flex;align-items:center;justify-content:center}
.tg::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 3px var(--gold-faint)}
.tg.open::before{box-shadow:0 0 0 3px var(--gold-faint),0 0 7px 2px var(--gold-soft)}
.tg.leafless::before{background:var(--dim);box-shadow:none}

.title{font-weight:700;text-transform:uppercase;cursor:text;outline:none;min-width:24px;padding:0 2px;border-radius:3px}
.title:focus{background:rgba(201,162,39,.10)}
.f>.row>.title{color:var(--gold)}

/* hover edit buttons on the title line */
.ops{display:none;align-items:center;gap:2px;margin-left:2px}
.row:hover .ops,.row:focus-within .ops{display:inline-flex}
.ops button{background:none;border:none;color:var(--dim);cursor:pointer;font-size:11px;line-height:1;padding:1px 3px;border-radius:3px}
.ops button:hover{color:var(--gold);background:rgba(201,162,39,.12)}
.drag{cursor:grab}

/* colour palette popover */
.pal{position:absolute;z-index:30;display:flex;gap:4px;background:#201c12;border:1px solid var(--gold-soft);border-radius:6px;padding:5px 6px}
.pal b{width:13px;height:13px;border-radius:50%;cursor:pointer;display:block}
.pal b:hover{outline:1px solid var(--gold)}

/* article card */
.card{border:1px solid var(--border);border-radius:7px;background:var(--card);margin:2px 0 4px 22px;padding:5px 8px;max-width:720px}
.body{outline:none;min-height:16px}
.body ul{margin:0;padding-left:18px}
.body li{margin:0}
.body:empty::before{content:"…";color:var(--dim)}
.fmt{display:none;gap:3px;border-top:1px dashed var(--gold-faint);margin-top:4px;padding-top:4px;flex-wrap:wrap}
.fmt.show{display:flex}
.fmt button{background:none;border:1px solid var(--gold-faint);color:var(--ink);border-radius:4px;font-size:11px;padding:0 5px;cursor:pointer}
.fmt button:hover{border-color:var(--gold);color:var(--gold)}
.fmt .sw{width:14px;height:14px;border-radius:50%;border:none;padding:0}
.cardtop{display:flex;justify-content:flex-end}
.cardtop button{background:none;border:none;color:var(--dim);font-size:10px;cursor:pointer}
.cardtop button:hover{color:var(--gold)}

.dropTarget{outline:1px dashed var(--gold);outline-offset:1px;border-radius:4px}

/* control panel */
#panel{position:fixed;left:0;right:0;bottom:0;background:#181510f2;border-top:1px solid var(--gold-soft);padding:6px 14px;backdrop-filter:blur(4px)}
#panel .prow{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:2px 0}
#panel .lbl{color:var(--dim);font-size:11px;margin-right:2px}
#panel button,#panel select{background:#201c12;border:1px solid var(--gold-faint);color:var(--ink);border-radius:4px;font-size:11px;padding:2px 8px;cursor:pointer;font-family:var(--font)}
#panel button:hover{border-color:var(--gold);color:var(--gold)}
#panel select:focus{outline:none;border-color:var(--gold)}
#panel .ico{font-size:12px;padding:2px 6px}
#panel .swb{width:16px;height:16px;border-radius:50%;padding:0;border:1px solid #0006}
#panel.hidden{display:none}
input[type=file]{display:none}
</style>
</head>
<body>

<div id="hdr">
  <h1>SmartNotes</h1>
  <span id="dot" title="同步狀態"></span>
  <button id="ctlToggle" title="顯示/隱藏控制列">控制列</button>
</div>

<div id="tree"></div>

<div id="panel">
  <div class="prow">
    <span class="lbl">檔案</span>
    <button id="bExpJson">匯出 JSON</button>
    <button id="bImpJson">匯入 JSON</button>
    <button id="bExpMd">匯出文字 (Markdown)</button>
    <button id="bExpHtml">匯出 HTML</button>
    <button id="bExpOkf">匯出 OKF 套件</button>
    <button id="bReset">重設</button>
    <input type="file" id="fileIn" accept=".json,application/json">
  </div>
  <div class="prow">
    <span class="lbl">樣式</span>
    <select id="selFont">
      <option value='"PingFang TC","-apple-system",sans-serif'>PingFang TC</option>
      <option value='-apple-system,"Helvetica Neue",sans-serif'>系統字體</option>
      <option value='Georgia,"Songti TC",serif'>襯線</option>
      <option value='"SF Mono",Menlo,monospace'>等寬</option>
    </select>
    <select id="selSize"></select>
    <select id="selIndent">
      <option value="12">縮排 窄</option>
      <option value="18" selected>縮排 中</option>
      <option value="26">縮排 寬</option>
      <option value="34">縮排 特寬</option>
    </select>
    <span class="lbl">框線色</span><span id="borderPal"></span>
  </div>
  <div class="prow">
    <span class="lbl">層級</span>
    <button class="ico" data-d="1" title="展開一層">▸¹</button>
    <button class="ico" data-d="2" title="展開兩層">▸²</button>
    <button class="ico" data-d="3" title="展開三層">▸³</button>
    <button class="ico" data-d="99" title="全部展開">▾＊</button>
    <button class="ico" data-d="0" title="全部收合">▸＊</button>
  </div>
</div>

<script>
/* ================= state ================= */
const SB_URL = "https://bxeraximugvvpkpaejdn.supabase.co";
const SB_KEY = "sb_publishable_i8jvS_ivsLBzYwb2HAKk1Q_d4DtCHjX";
const SB_TABLE = "smartnotes";
const DOC_ID = "main";
const PALETTE = ["#ffb454","#6cb6ff","#39d0c3","#ffe066","#ff7ab2","#b18cff","#9ece6a","#e8e2d0"];

const uid = () => Math.random().toString(36).slice(2,10)+Date.now().toString(36);
const freshState = () => ({
  root:{id:uid(),type:"folder",title:"TITLE",collapsed:false,children:[]},
  settings:{font:'"PingFang TC","-apple-system",sans-serif',size:12,indent:18,border:"#c9a227"}
});
let state = freshState();

function findNode(id,node=state.root,parent=null){
  if(node.id===id) return {node,parent};
  for(const c of (node.children||[])){
    const r=findNode(id,c,node); if(r) return r;
  }
  return null;
}
function isDescendant(anc,id){
  if(anc.id===id) return true;
  return (anc.children||[]).some(c=>isDescendant(c,id));
}

/* ================= IndexedDB ================= */
function idb(){return new Promise((res,rej)=>{
  const rq=indexedDB.open("smartnotes",1);
  rq.onupgradeneeded=()=>rq.result.createObjectStore("kv");
  rq.onsuccess=()=>res(rq.result); rq.onerror=()=>rej(rq.error);
});}
async function idbSet(v){try{const db=await idb();db.transaction("kv","readwrite").objectStore("kv").put(v,"tree");}catch(e){}}
async function idbGet(){try{const db=await idb();return await new Promise(res=>{
  const rq=db.transaction("kv").objectStore("kv").get("tree");
  rq.onsuccess=()=>res(rq.result); rq.onerror=()=>res(null);
});}catch(e){return null}}

/* ================= Supabase sync ================= */
const dot=document.getElementById("dot");
let debounceT=null, retryT=null;
function setDot(c){dot.className=c}
function touch(){                      // called on every edit
  idbSet(JSON.parse(JSON.stringify(state)));
  setDot("gold");
  clearTimeout(debounceT);
  debounceT=setTimeout(pushCloud,1500);
}
async function pushCloud(){
  clearTimeout(retryT);
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${SB_TABLE}?on_conflict=id`,{
      method:"POST",
      headers:{apikey:SB_KEY,Authorization:"Bearer "+SB_KEY,
        "Content-Type":"application/json",Prefer:"resolution=merge-duplicates"},
      body:JSON.stringify([{id:DOC_ID,data:state,updated_at:new Date().toISOString()}])
    });
    if(!r.ok) throw 0;
    setDot("green");
  }catch(e){
    setDot("red");
    retryT=setTimeout(pushCloud,5000);   // automatic retry every 5s
  }
}
async function loadCloud(){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${SB_TABLE}?id=eq.${DOC_ID}&select=data`,{
      headers:{apikey:SB_KEY,Authorization:"Bearer "+SB_KEY}});
    if(!r.ok) return null;
    const j=await r.json();
    return (j[0]&&j[0].data)||null;
  }catch(e){return null}
}

/* ================= render ================= */
const treeEl=document.getElementById("tree");
function applySettings(){
  const s=state.settings, R=document.documentElement.style;
  R.setProperty("--font",s.font); R.setProperty("--fs",s.size+"px");
  R.setProperty("--indent",s.indent+"px"); R.setProperty("--border",s.border);
  selFont.value=s.font; selSize.value=s.size; selIndent.value=s.indent;
}
function render(){
  treeEl.innerHTML="";
  treeEl.appendChild(renderNode(state.root,true));
  applySettings();
}
function opBtn(t,title,fn,cls){const b=document.createElement("button");b.textContent=t;b.title=title;if(cls)b.className=cls;b.onclick=e=>{e.stopPropagation();fn(e)};return b}

function renderNode(n,isRoot=false){
  const wrap=document.createElement("div");
  wrap.className="node "+(n.type==="folder"?"f":"a");
  wrap.dataset.id=n.id;

  const row=document.createElement("div"); row.className="row";
  /* halo toggle bullet, one click to expand/collapse */
  const tg=document.createElement("button");
  tg.className="tg "+(n.collapsed?"":"open");
  const expandable=n.type==="article" || (n.children&&n.children.length);
  if(!expandable) tg.classList.add("leafless");
  tg.onclick=()=>{n.collapsed=!n.collapsed;touch();render()};
  row.appendChild(tg);

  /* editable title (click to edit) */
  const t=document.createElement("span");
  t.className="title"; t.contentEditable=true; t.spellcheck=false;
  t.textContent=n.title; if(n.color) t.style.color=n.color;
  t.oninput=()=>{n.title=t.textContent;touch()};
  t.onkeydown=e=>{if(e.key==="Enter"){e.preventDefault();t.blur()}};
  row.appendChild(t);

  /* hover edit buttons on same line */
  const ops=document.createElement("span"); ops.className="ops";
  if(n.type==="folder"){
    ops.appendChild(opBtn("▣","新增資料夾",()=>{n.children.push({id:uid(),type:"folder",title:"FOLDER",collapsed:false,children:[]});n.collapsed=false;touch();render()}));
    ops.appendChild(opBtn("✎","新增文章卡",()=>{n.children.push({id:uid(),type:"article",title:"ARTICLE",collapsed:false,content:"",children:[]});n.collapsed=false;touch();render()}));
  }
  ops.appendChild(opBtn("◐","文字顏色",e=>showPalette(e.target,c=>{n.color=c;touch();render()})));
  if(!isRoot){
    ops.appendChild(opBtn("✕","刪除",()=>{if(!confirm("刪除「"+n.title+"」及其內容?"))return;const f=findNode(n.id);f.parent.children=f.parent.children.filter(x=>x.id!==n.id);touch();render()}));
    const dh=opBtn("⋮⋮","拖移","",()=>{}); dh.className="drag"; dh.draggable=true;
    dh.ondragstart=e=>{e.dataTransfer.setData("text/id",n.id);e.stopPropagation()};
    ops.appendChild(dh);
  }
  row.appendChild(ops);

  /* drop target: move into this folder */
  if(n.type==="folder"){
    row.ondragover=e=>{e.preventDefault();row.classList.add("dropTarget")};
    row.ondragleave=()=>row.classList.remove("dropTarget");
    row.ondrop=e=>{
      e.preventDefault();row.classList.remove("dropTarget");
      const id=e.dataTransfer.getData("text/id"); if(!id||id===n.id)return;
      const src=findNode(id); if(!src||isDescendant(src.node,n.id))return;
      src.parent.children=src.parent.children.filter(x=>x.id!==id);
      n.children.push(src.node); n.collapsed=false; touch(); render();
    };
  }
  wrap.appendChild(row);

  /* article body card */
  if(n.type==="article" && !n.collapsed){
    const card=document.createElement("div"); card.className="card";
    const top=document.createElement("div"); top.className="cardtop";
    const fb=document.createElement("button"); fb.textContent="Aa"; fb.title="顯示/隱藏格式列";
    top.appendChild(fb); card.appendChild(top);
    const body=document.createElement("div"); body.className="body";
    body.contentEditable=true; body.spellcheck=false; body.innerHTML=n.content||"";
    body.oninput=()=>{n.content=body.innerHTML;touch()};
    card.appendChild(body);
    const fmt=document.createElement("div"); fmt.className="fmt";
    fb.onclick=()=>fmt.classList.toggle("show");
    const cmd=(c,v)=>{body.focus();document.execCommand(c,false,v);n.content=body.innerHTML;touch()};
    fmt.appendChild(opBtn("B","粗體",()=>cmd("bold")));
    fmt.appendChild(opBtn("I","斜體",()=>cmd("italic")));
    fmt.appendChild(opBtn("•","項目符號",()=>cmd("insertUnorderedList")));
    fmt.appendChild(opBtn("⇥","增加縮排",()=>cmd("indent")));
    fmt.appendChild(opBtn("⇤","減少縮排",()=>cmd("outdent")));
    PALETTE.forEach(c=>{const s=opBtn("","文字色 "+c,()=>cmd("foreColor",c));s.className="sw";s.style.background=c;fmt.appendChild(s)});
    card.appendChild(fmt);
    wrap.appendChild(card);
  }

  /* children */
  if(n.children&&n.children.length){
    const k=document.createElement("div"); k.className="kids"+(n.collapsed?" hidden":"");
    n.children.forEach(c=>k.appendChild(renderNode(c)));
    wrap.appendChild(k);
  }
  return wrap;
}

/* floating colour palette */
function showPalette(anchor,onPick){
  document.querySelectorAll(".pal").forEach(p=>p.remove());
  const p=document.createElement("div"); p.className="pal";
  PALETTE.forEach(c=>{const b=document.createElement("b");b.style.background=c;b.onclick=()=>{onPick(c);p.remove()};p.appendChild(b)});
  const rst=document.createElement("b"); rst.style.background="none"; rst.style.border="1px solid "+"#8d8468"; rst.title="還原";
  rst.onclick=()=>{onPick(null);p.remove()}; p.appendChild(rst);
  document.body.appendChild(p);
  const r=anchor.getBoundingClientRect();
  p.style.left=(r.left+window.scrollX)+"px"; p.style.top=(r.bottom+window.scrollY+4)+"px";
  setTimeout(()=>document.addEventListener("click",function h(e){if(!p.contains(e.target)){p.remove();document.removeEventListener("click",h)}}),0);
}

/* ================= expand / collapse levels ================= */
function setDepth(maxOpen){
  (function walk(n,d){
    n.collapsed = d>=maxOpen;
    (n.children||[]).forEach(c=>walk(c,d+1));
  })(state.root,0);
  touch(); render();
}
document.querySelectorAll("#panel [data-d]").forEach(b=>b.onclick=()=>setDepth(+b.dataset.d===0?0:+b.dataset.d));

/* ================= exports ================= */
const pad=n=>String(n).padStart(2,"0");
function baseName(){
  const d=new Date(), ymd=""+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate());
  const t=(state.root.title||"SmartNotes").trim().replace(/[\\/:*?"<>|]/g,"") || "SmartNotes";
  return t+" "+ymd;
}
function download(name,content,mime){
  const blob=content instanceof Blob?content:new Blob([content],{type:mime});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),4000);
}

/* HTML → Markdown (bold, italic, nested bullets) */
function htmlToMd(html){
  const div=document.createElement("div"); div.innerHTML=html||"";
  function inline(node){
    let out="";
    node.childNodes.forEach(c=>{
      if(c.nodeType===3){out+=c.textContent;return}
      const tag=c.tagName?c.tagName.toLowerCase():"";
      if(tag==="b"||tag==="strong") out+="**"+inline(c)+"**";
      else if(tag==="i"||tag==="em") out+="*"+inline(c)+"*";
      else if(tag==="br") out+="\n";
      else if(tag==="ul") out+="\n"+list(c,0);
      else if(tag==="div"||tag==="p") out+=inline(c)+"\n";
      else out+=inline(c);
    });
    return out;
  }
  function list(ul,depth){
    let out="";
    ul.childNodes.forEach(li=>{
      if(!li.tagName||li.tagName.toLowerCase()!=="li")return;
      let text="",subs="";
      li.childNodes.forEach(c=>{
        if(c.tagName&&c.tagName.toLowerCase()==="ul") subs+=list(c,depth+1);
        else{const tmp=document.createElement("div");tmp.appendChild(c.cloneNode(true));text+=inline(tmp)}
      });
      out+="  ".repeat(depth)+"- "+text.trim()+"\n"+subs;
    });
    return out;
  }
  return inline(div).replace(/\n{3,}/g,"\n\n").trim();
}
function plainText(html){const d=document.createElement("div");d.innerHTML=html||"";return d.textContent.trim()}

function toMarkdown(){
  let out="";
  (function walk(n,depth){
    if(n.type==="folder"){
      out+="#".repeat(Math.min(depth,6))+" "+n.title.toUpperCase()+"\n\n";
      (n.children||[]).forEach(c=>walk(c,depth+1));
    }else{
      out+="**"+n.title.toUpperCase()+"**\n\n"+htmlToMd(n.content)+"\n\n";
    }
  })(state.root,1);
  return out;
}
function toHtml(){
  function walk(n){
    if(n.type==="folder")
      return `<details open><summary>${esc(n.title.toUpperCase())}</summary>${(n.children||[]).map(walk).join("")}</details>`;
    return `<details open class="a"><summary>${esc(n.title.toUpperCase())}</summary><div class="card">${n.content||""}</div>${(n.children||[]).map(walk).join("")}</details>`;
  }
  const esc=s=>s.replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]));
  return `<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><title>${esc(state.root.title)}</title><style>
body{background:#14120c;color:#e8e2d0;font-family:${state.settings.font};font-size:${state.settings.size}px;line-height:1.35;padding:16px}
summary{font-weight:700;text-transform:uppercase;color:#c9a227;cursor:pointer;list-style:none}
summary::before{content:"";display:inline-block;width:6px;height:6px;border-radius:50%;background:#c9a227;box-shadow:0 0 0 3px rgba(201,162,39,.18);margin-right:8px;vertical-align:1px}
details{margin-left:${state.settings.indent}px;border-left:1px solid rgba(201,162,39,.18);padding-left:6px}
body>details{margin-left:0;border-left:none;padding-left:0}
.a summary{color:#e8e2d0}
.card{border:1px solid ${state.settings.border};border-radius:7px;background:#1a1710;padding:6px 9px;margin:3px 0 6px 14px;max-width:720px}
ul{margin:0;padding-left:18px}</style></head><body>${walk(state.root)}</body></html>`;
}
async function toOkf(){
  const zip=new JSZip();
  const safe=s=>(s||"UNTITLED").trim().replace(/[\\/:*?"<>|#]/g,"").slice(0,60)||"UNTITLED";
  (function walk(n,dir){
    if(n.type==="folder"){
      const d=dir.folder(safe(n.title));
      (n.children||[]).forEach(c=>walk(c,d));
    }else{
      const body=htmlToMd(n.content);
      const desc=plainText(n.content).slice(0,120).replace(/"/g,"'");
      const md=`---\ntype: article\ntitle: "${(n.title||"").replace(/"/g,"'")}"\ndescription: "${desc}"\ntags: []\ntimestamp: ${new Date().toISOString()}\n---\n\n# ${n.title.toUpperCase()}\n\n${body}\n`;
      dir.file(safe(n.title)+".md",md);
      (n.children||[]).forEach(c=>walk(c,dir));
    }
  })(state.root,zip);
  return zip.generateAsync({type:"blob"});
}

bExpJson.onclick=()=>download(baseName()+".json",JSON.stringify(state,null,2),"application/json");
bExpMd.onclick =()=>download(baseName()+".md",toMarkdown(),"text/markdown");
bExpHtml.onclick=()=>download(baseName()+".html",toHtml(),"text/html");
bExpOkf.onclick=async()=>download(baseName()+" OKF.zip",await toOkf());
bImpJson.onclick=()=>fileIn.click();
fileIn.onchange=e=>{
  const f=e.target.files[0]; if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{try{
      const j=JSON.parse(rd.result);
      if(!j.root||!j.root.type) throw 0;
      state=j; if(!state.settings) state.settings=freshState().settings;
      touch(); render();
    }catch(err){alert("匯入失敗:僅接受本應用匯出的 JSON 檔")}};
  rd.readAsText(f); fileIn.value="";
};
bReset.onclick=()=>{if(confirm("清除全部內容並重新開始?")){state=freshState();touch();render()}};

/* ================= styling controls ================= */
for(let s=10;s<=18;s++){const o=document.createElement("option");o.value=s;o.textContent="字級 "+s;selSize.appendChild(o)}
selFont.onchange=()=>{state.settings.font=selFont.value;touch();applySettings()};
selSize.onchange=()=>{state.settings.size=+selSize.value;touch();applySettings()};
selIndent.onchange=()=>{state.settings.indent=+selIndent.value;touch();applySettings()};
const bp=document.getElementById("borderPal");
["#c9a227","#ffb454","#6cb6ff","#39d0c3","#ffe066","#ff7ab2","#b18cff","#8d8468"].forEach(c=>{
  const b=document.createElement("button");b.className="swb";b.style.background=c;b.title="框線色 "+c;
  b.onclick=()=>{state.settings.border=c;touch();applySettings()};bp.appendChild(b);
});
ctlToggle.onclick=()=>document.getElementById("panel").classList.toggle("hidden");

/* ================= boot: cloud → local → fresh ================= */
(async function boot(){
  setDot("gold");
  const cloud=await loadCloud();
  if(cloud&&cloud.root){state=cloud;setDot("green")}
  else{
    const local=await idbGet();
    if(local&&local.root){state=local;setDot(cloud===null?"red":"green");if(cloud===null)retryT=setTimeout(pushCloud,5000)}
    else{state=freshState();setDot("green")}
  }
  if(!state.settings) state.settings=freshState().settings;
  render();
})();
</script>
</body>
