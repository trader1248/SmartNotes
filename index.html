<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SmartNotes</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{
  --font:"PingFang TC","Microsoft JhengHei",sans-serif;
  --fs:12px;
  --indent:18px;
  --bg:#14110b;
  --gold:#d4af37;
  --gold-dim:#8a7326;
  --line:#3a3220;
  --card-border:#d4af37;
  --text:#e8e2d0;
  --muted:#9a8f6f;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:var(--fs);line-height:1.35}
body{min-height:100vh;display:flex;flex-direction:column}

/* header */
header{display:flex;align-items:center;gap:8px;padding:6px 10px;border-bottom:1px solid var(--line)}
header h1{font-size:14px;font-weight:700;color:var(--gold);letter-spacing:.5px}
header .spacer{flex:1}
#statusDot{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 5px var(--gold);transition:background .3s}
#statusDot.ok{background:#4caf50;box-shadow:0 0 5px #4caf50}
#statusDot.err{background:#e05252;box-shadow:0 0 5px #e05252}
#toggleCtrl{background:none;border:1px solid var(--line);border-radius:4px;color:var(--gold);cursor:pointer;font-size:11px;padding:1px 6px}
#toggleCtrl:hover{border-color:var(--gold)}

/* tree */
main{flex:1;padding:8px 10px;overflow:auto}
.row{display:flex;align-items:center;gap:4px;min-height:20px;border-radius:3px;padding-right:4px}
.row.dragover{outline:1px dashed var(--gold)}
.bullet{width:16px;height:16px;flex:0 0 16px;border:none;background:none;cursor:pointer;position:relative;padding:0}
.bullet::before{content:"";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:5px;height:5px;border-radius:50%;background:var(--gold)}
.bullet.halo::after{content:"";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:rgba(212,175,55,.22)}
.bullet.leaf::before{background:var(--gold-dim)}
.title{font-weight:700;outline:none;cursor:text;padding:0 2px;border-radius:2px;white-space:pre-wrap}
.title:focus{background:rgba(212,175,55,.08)}
.actions{display:none;align-items:center;gap:2px;margin-left:2px}
.row:hover .actions{display:inline-flex}
.actions button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;line-height:1;padding:1px 3px;border-radius:3px}
.actions button:hover{color:var(--gold);background:rgba(212,175,55,.1)}
.grip{cursor:grab}

/* article card */
.card{border:1px solid var(--card-border);border-radius:6px;padding:5px 8px;margin:2px 0 4px 0}
.card .toolbar{display:none;gap:2px;margin-bottom:3px;border-bottom:1px solid var(--line);padding-bottom:3px}
.card .toolbar.show{display:flex}
.card .toolbar button{background:none;border:1px solid var(--line);border-radius:3px;color:var(--text);cursor:pointer;font-size:11px;padding:0 5px;height:18px}
.card .toolbar button:hover{border-color:var(--gold);color:var(--gold)}
.content{outline:none;min-height:16px}
.content ul{padding-left:var(--indent);list-style:disc}
.content ul ul{list-style:circle}
.content li{margin:0}

/* palette */
#palette{position:absolute;display:none;background:#1c1810;border:1px solid var(--gold);border-radius:5px;padding:6px;z-index:50}
#palette .prow{display:flex;gap:4px;margin-bottom:4px}
#palette .prow:last-child{margin-bottom:0}
#palette .sw{width:16px;height:16px;border-radius:3px;cursor:pointer;border:1px solid rgba(255,255,255,.15)}
#palette .sw:hover{outline:1px solid #fff}

/* controls */
footer{border-top:1px solid var(--line);padding:6px 10px;display:flex;flex-direction:column;gap:5px}
footer.hidden{display:none}
.ctrlrow{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ctrlrow .lbl{color:var(--muted)}
footer button,footer select{background:#1c1810;border:1px solid var(--line);border-radius:4px;color:var(--text);font-family:var(--font);font-size:11px;padding:2px 8px;cursor:pointer}
footer button:hover{border-color:var(--gold);color:var(--gold)}
footer select:focus{outline:none;border-color:var(--gold)}
.iconbtn{font-size:11px;min-width:30px}
</style>
</head>
<body>
<header>
  <h1>SmartNotes</h1>
  <div class="spacer"></div>
  <div id="statusDot" title="同步狀態"></div>
  <button id="toggleCtrl" title="顯示/隱藏控制列">⚙</button>
</header>

<main id="tree"></main>

<footer id="controls">
  <div class="ctrlrow">
    <button id="btnExportJson">匯出 JSON</button>
    <button id="btnImportJson">匯入 JSON</button>
    <button id="btnExportMd">匯出 Markdown</button>
    <button id="btnExportHtml">匯出 HTML</button>
    <button id="btnExportOkf">匯出 OKF 套件</button>
    <button id="btnReset">重設</button>
  </div>
  <div class="ctrlrow">
    <span class="lbl">字型</span>
    <select id="selFont">
      <option value='"PingFang TC","Microsoft JhengHei",sans-serif'>PingFang TC</option>
      <option value='"Songti TC","Noto Serif TC",serif'>宋體</option>
      <option value='"Kaiti TC","BiauKai",serif'>楷體</option>
      <option value='Helvetica,Arial,sans-serif'>Helvetica</option>
      <option value='Georgia,serif'>Georgia</option>
      <option value='Menlo,Consolas,monospace'>等寬</option>
    </select>
    <span class="lbl">字號</span>
    <select id="selSize">
      <option>10</option><option>11</option><option selected>12</option>
      <option>13</option><option>14</option><option>16</option><option>18</option>
    </select>
    <span class="lbl">縮排距離</span>
    <select id="selIndent">
      <option>12</option><option>15</option><option selected>18</option>
      <option>22</option><option>26</option><option>32</option>
    </select>
    <span class="lbl">邊框顏色</span>
    <button id="btnBorderColor">▦</button>
  </div>
  <div class="ctrlrow">
    <span class="lbl">展開</span>
    <button class="iconbtn" data-depth="1" title="展開一層">▸1</button>
    <button class="iconbtn" data-depth="2" title="展開兩層">▸2</button>
    <button class="iconbtn" data-depth="3" title="展開三層">▸3</button>
    <button class="iconbtn" data-depth="99" title="全部展開">▸▸</button>
    <button class="iconbtn" data-depth="0" title="全部收合">▾✕</button>
  </div>
</footer>

<input type="file" id="fileInput" accept="application/json" style="display:none">
<div id="palette"></div>

<script>
/* ================= Supabase config ================= */
const SB_URL = "https://bxeraximugvvpkpaejdn.supabase.co";
const SB_KEY = "sb_publishable_i8jvS_ivsLBzYwb2HAKk1Q_d4DtCHjX";
const SB_TABLE = "smartnotes";
const DOC_ID = "main";

/* ================= State ================= */
const uid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36);
function freshDoc(){
  return {
    version: 1,
    settings: { font: document.getElementById('selFont').value, size: "12", indent: "18", border: "#d4af37" },
    tree: { id: uid(), type: "folder", title: "TITLE", collapsed: false, children: [] }
  };
}
let doc = freshDoc();

/* ================= Tree helpers ================= */
function findNode(id, node = doc.tree, parent = null){
  if(node.id === id) return { node, parent };
  for(const c of (node.children || [])){
    const r = findNode(id, c, node);
    if(r) return r;
  }
  return null;
}
function isDescendant(ancestorId, id){
  const a = findNode(ancestorId); if(!a) return false;
  return !!findNode(id, a.node) && ancestorId !== id;
}

/* ================= Render ================= */
const treeEl = document.getElementById('tree');
function render(){
  treeEl.innerHTML = "";
  treeEl.appendChild(renderNode(doc.tree, 0, true));
}
function renderNode(node, depth, isRoot){
  const wrap = document.createElement('div');
  wrap.style.marginLeft = isRoot ? "0" : "var(--indent)";

  const row = document.createElement('div');
  row.className = "row";
  row.dataset.id = node.id;

  /* bullet */
  const b = document.createElement('button');
  b.className = "bullet";
  const hasInner = node.type === "folder" ? (node.children||[]).length > 0 : true;
  if(!hasInner) b.classList.add('leaf');
  if(hasInner && node.collapsed) b.classList.add('halo');
  b.title = node.collapsed ? "展開" : "收合";
  b.onclick = () => { node.collapsed = !node.collapsed; markDirty(); render(); };
  row.appendChild(b);

  /* title */
  const t = document.createElement('span');
  t.className = "title";
  t.contentEditable = "true";
  t.spellcheck = false;
  t.textContent = node.title;
  if(node.color) t.style.color = node.color;
  t.oninput = () => { node.title = t.textContent; markDirty(); };
  t.onkeydown = e => { if(e.key === "Enter"){ e.preventDefault(); t.blur(); } };
  row.appendChild(t);

  /* actions */
  const acts = document.createElement('span');
  acts.className = "actions";
  if(!isRoot){
    const grip = mkBtn("⠿","拖曳移動","grip");
    grip.draggable = true;
    grip.ondragstart = e => { e.dataTransfer.setData("text/plain", node.id); e.dataTransfer.effectAllowed = "move"; };
    acts.appendChild(grip);
  }
  if(node.type === "folder"){
    acts.appendChild(mkBtn("▣＋","新增資料夾",null,()=>{ node.children.push({id:uid(),type:"folder",title:"FOLDER",collapsed:false,children:[]}); node.collapsed=false; markDirty(); render(); }));
    acts.appendChild(mkBtn("✎＋","新增文章卡",null,()=>{ node.children.push({id:uid(),type:"article",title:"ARTICLE",collapsed:false,content:"",children:[]}); node.collapsed=false; markDirty(); render(); }));
  }
  if(node.type === "article"){
    acts.appendChild(mkBtn("Aa","顯示/隱藏格式列",null,()=>{ const tb = wrap.querySelector(".toolbar"); if(tb) tb.classList.toggle("show"); }));
  }
  acts.appendChild(mkBtn("◩","標題文字顏色",null,(e)=>openPalette(e.target, c=>{ node.color=c; markDirty(); render(); })));
  if(!isRoot){
    acts.appendChild(mkBtn("✕","刪除",null,()=>{ if(confirm("刪除「"+node.title+"」及其所有內容?")){ const p=findNode(node.id).parent; p.children=p.children.filter(c=>c.id!==node.id); markDirty(); render(); } }));
  }
  row.appendChild(acts);

  /* drop target */
  row.ondragover = e => { e.preventDefault(); row.classList.add("dragover"); };
  row.ondragleave = () => row.classList.remove("dragover");
  row.ondrop = e => {
    e.preventDefault(); row.classList.remove("dragover");
    const dragId = e.dataTransfer.getData("text/plain");
    if(!dragId || dragId === node.id || isDescendant(dragId, node.id)) return;
    const src = findNode(dragId); if(!src) return;
    src.parent.children = src.parent.children.filter(c=>c.id!==dragId);
    if(node.type === "folder"){ node.children.push(src.node); node.collapsed = false; }
    else{ const p = findNode(node.id).parent; const i = p.children.findIndex(c=>c.id===node.id); p.children.splice(i+1,0,src.node); }
    markDirty(); render();
  };

  wrap.appendChild(row);

  /* expanded body */
  if(!node.collapsed){
    if(node.type === "article"){
      const card = document.createElement('div');
      card.className = "card";
      card.style.marginLeft = "16px";
      const tb = document.createElement('div');
      tb.className = "toolbar";
      tb.appendChild(mkTb("B","粗體",()=>exec("bold")));
      tb.appendChild(mkTb("I","斜體",()=>exec("italic")));
      tb.appendChild(mkTb("•","項目符號",()=>exec("insertUnorderedList")));
      tb.appendChild(mkTb("◩","文字顏色",(e)=>openPalette(e.target, c=>exec("foreColor",c))));
      card.appendChild(tb);
      const ct = document.createElement('div');
      ct.className = "content";
      ct.contentEditable = "true";
      ct.spellcheck = false;
      ct.innerHTML = node.content || "";
      ct.oninput = () => { node.content = ct.innerHTML; markDirty(); };
      ct.onfocus = () => tb.classList.add("show");
      card.appendChild(ct);
      wrap.appendChild(card);
    }
    for(const c of (node.children || [])) wrap.appendChild(renderNode(c, depth+1, false));
  }
  return wrap;
}
function mkBtn(txt, title, cls, fn){
  const b = document.createElement('button');
  b.textContent = txt; b.title = title;
  if(cls) b.className = cls;
  if(fn) b.onclick = fn;
  return b;
}
function mkTb(txt, title, fn){
  const b = document.createElement('button');
  b.textContent = txt; b.title = title;
  b.onmousedown = e => e.preventDefault(); /* keep selection */
  b.onclick = fn;
  return b;
}
function exec(cmd, val){ document.execCommand(cmd, false, val || null); }

/* ================= Colour palette (2D) ================= */
const HUES = ["#ff9b3d","#ffd54a","#f5e663","#9ee06a","#4dd9c0","#4db8ff","#7a8cff","#c88bff","#ff7ab0","#ff6b5e"];
function shade(hex, f){
  const n = parseInt(hex.slice(1),16), r=n>>16, g=(n>>8)&255, b=n&255;
  const m = x => Math.round(x + (255-x)*f);
  const d = x => Math.round(x * (1+f));
  const fn = f >= 0 ? m : x => Math.round(x*(1+f));
  return "#" + [r,g,b].map(x=>Math.min(255,Math.max(0,fn(x))).toString(16).padStart(2,"0")).join("");
}
const palEl = document.getElementById('palette');
let palCb = null;
function openPalette(anchor, cb){
  palCb = cb;
  palEl.innerHTML = "";
  [0.35, 0, -0.3].forEach(f => {
    const r = document.createElement('div'); r.className = "prow";
    HUES.forEach(h => {
      const c = shade(h, f);
      const s = document.createElement('div');
      s.className = "sw"; s.style.background = c; s.title = c;
      s.onclick = () => { palEl.style.display = "none"; palCb && palCb(c); };
      r.appendChild(s);
    });
    palEl.appendChild(r);
  });
  const rc = anchor.getBoundingClientRect();
  palEl.style.left = Math.min(rc.left, window.innerWidth - 240) + window.scrollX + "px";
  palEl.style.top = rc.bottom + 4 + window.scrollY + "px";
  palEl.style.display = "block";
}
document.addEventListener('mousedown', e => { if(!palEl.contains(e.target)) palEl.style.display = "none"; });

/* ================= Settings ================= */
const selFont = document.getElementById('selFont'),
      selSize = document.getElementById('selSize'),
      selIndent = document.getElementById('selIndent');
function applySettings(){
  const s = doc.settings;
  document.documentElement.style.setProperty("--font", s.font);
  document.documentElement.style.setProperty("--fs", s.size + "px");
  document.documentElement.style.setProperty("--indent", s.indent + "px");
  document.documentElement.style.setProperty("--card-border", s.border);
  selFont.value = s.font; selSize.value = s.size; selIndent.value = s.indent;
}
selFont.onchange = () => { doc.settings.font = selFont.value; applySettings(); markDirty(); };
selSize.onchange = () => { doc.settings.size = selSize.value; applySettings(); markDirty(); };
selIndent.onchange = () => { doc.settings.indent = selIndent.value; applySettings(); markDirty(); };
document.getElementById('btnBorderColor').onclick = e =>
  openPalette(e.target, c => { doc.settings.border = c; applySettings(); markDirty(); });

document.getElementById('toggleCtrl').onclick = () =>
  document.getElementById('controls').classList.toggle('hidden');

/* expand / collapse levels */
document.querySelectorAll('.iconbtn[data-depth]').forEach(b => {
  b.onclick = () => {
    const d = parseInt(b.dataset.depth);
    (function walk(n, depth){
      n.collapsed = d === 0 ? true : depth >= d;
      (n.children||[]).forEach(c => walk(c, depth+1));
    })(doc.tree, 0);
    if(d === 0) doc.tree.collapsed = true;
    markDirty(); render();
  };
});

/* ================= Persistence: IndexedDB ================= */
let idb = null;
function openIDB(){
  return new Promise(res => {
    const rq = indexedDB.open("smartnotes", 1);
    rq.onupgradeneeded = () => rq.result.createObjectStore("kv");
    rq.onsuccess = () => { idb = rq.result; res(); };
    rq.onerror = () => res();
  });
}
function idbPut(){
  if(!idb) return;
  try{ idb.transaction("kv","readwrite").objectStore("kv").put(JSON.parse(JSON.stringify(doc)), "doc"); }catch(e){}
}
function idbGet(){
  return new Promise(res => {
    if(!idb) return res(null);
    const rq = idb.transaction("kv").objectStore("kv").get("doc");
    rq.onsuccess = () => res(rq.result || null);
    rq.onerror = () => res(null);
  });
}

/* ================= Sync: Supabase ================= */
const dot = document.getElementById('statusDot');
function setStatus(s){ dot.className = s === "ok" ? "ok" : s === "err" ? "err" : ""; }
let saveTimer = null, retryTimer = null;
function markDirty(){
  idbPut();
  setStatus("sync");
  clearTimeout(saveTimer);
  saveTimer = setTimeout(pushCloud, 1500);
}
async function pushCloud(){
  clearTimeout(retryTimer);
  try{
    const r = await fetch(`${SB_URL}/rest/v1/${SB_TABLE}`, {
      method: "POST",
      headers: {
        apikey: SB_KEY,
        Authorization: "Bearer " + SB_KEY,
        "Content-Type": "application/json",
        Prefer: "resolution=merge-duplicates"
      },
      body: JSON.stringify([{ id: DOC_ID, data: doc, updated_at: new Date().toISOString() }])
    });
    if(!r.ok) throw new Error(r.status);
    setStatus("ok");
  }catch(e){
    setStatus("err");
    retryTimer = setTimeout(pushCloud, 5000);
  }
}
async function pullCloud(){
  try{
    const r = await fetch(`${SB_URL}/rest/v1/${SB_TABLE}?id=eq.${DOC_ID}&select=data`, {
      headers: { apikey: SB_KEY, Authorization: "Bearer " + SB_KEY }
    });
    if(!r.ok) return null;
    const rows = await r.json();
    return rows.length && rows[0].data && rows[0].data.tree ? rows[0].data : null;
  }catch(e){ return null; }
}

/* ================= Export helpers ================= */
function ymd(){
  const d = new Date();
  return d.getFullYear() + String(d.getMonth()+1).padStart(2,"0") + String(d.getDate()).padStart(2,"0");
}
function safeName(s){ return (s || "Untitled").replace(/[\\/:*?"<>|]/g, "_").trim(); }
function baseName(){ return safeName(doc.tree.title) + " " + ymd(); }
function download(content, name, mime){
  const blob = content instanceof Blob ? content : new Blob([content], { type: mime });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 3000);
}
function stripHtml(html){
  const d = document.createElement('div'); d.innerHTML = html || "";
  return d.textContent.replace(/\s+/g," ").trim();
}
function htmlToMd(html){
  const root = document.createElement('div'); root.innerHTML = html || "";
  function walk(n, depth){
    let out = "";
    n.childNodes.forEach(c => {
      if(c.nodeType === 3){ out += c.textContent; return; }
      const tag = c.tagName ? c.tagName.toLowerCase() : "";
      if(tag === "b" || tag === "strong") out += "**" + walk(c, depth) + "**";
      else if(tag === "i" || tag === "em") out += "*" + walk(c, depth) + "*";
      else if(tag === "ul") out += "\n" + walkList(c, depth);
      else if(tag === "br") out += "\n";
      else if(tag === "div" || tag === "p") out += "\n" + walk(c, depth);
      else out += walk(c, depth);
    });
    return out;
  }
  function walkList(ul, depth){
    let out = "";
    ul.childNodes.forEach(li => {
      if(!li.tagName || li.tagName.toLowerCase() !== "li") return;
      let line = "", sub = "";
      li.childNodes.forEach(c => {
        if(c.tagName && c.tagName.toLowerCase() === "ul") sub += walkList(c, depth+1);
        else line += c.nodeType === 3 ? c.textContent : walk(c, depth);
      });
      out += "  ".repeat(depth) + "- " + line.trim() + "\n" + sub;
    });
    return out;
  }
  return walk(root, 0).replace(/\n{3,}/g, "\n\n").trim();
}

/* JSON */
document.getElementById('btnExportJson').onclick = () =>
  download(JSON.stringify(doc, null, 2), baseName() + ".json", "application/json");

/* Import */
const fileInput = document.getElementById('fileInput');
document.getElementById('btnImportJson').onclick = () => fileInput.click();
fileInput.onchange = () => {
  const f = fileInput.files[0]; if(!f) return;
  const rd = new FileReader();
  rd.onload = () => {
    try{
      const d = JSON.parse(rd.result);
      if(!d.tree) throw 0;
      doc = d;
      applySettings(); render(); markDirty();
    }catch(e){ alert("無法讀取:僅接受本應用匯出的 JSON 檔"); }
    fileInput.value = "";
  };
  rd.readAsText(f);
};

/* Markdown (single file) */
document.getElementById('btnExportMd').onclick = () => {
  let out = "";
  (function walk(n, depth){
    if(n.type === "folder"){
      out += "#".repeat(Math.min(depth+1,6)) + " " + n.title + "\n\n";
      (n.children||[]).forEach(c => walk(c, depth+1));
    }else{
      out += "**" + n.title + "**\n\n";
      const body = htmlToMd(n.content);
      if(body) out += body + "\n\n";
      (n.children||[]).forEach(c => walk(c, depth+1));
    }
  })(doc.tree, 0);
  download(out, baseName() + ".md", "text/markdown");
};

/* HTML */
document.getElementById('btnExportHtml').onclick = () => {
  function nodeHtml(n){
    let h = "<li><span class='t'" + (n.color ? " style='color:" + n.color + "'" : "") + ">" + esc(n.title) + "</span>";
    if(n.type === "article" && n.content) h += "<div class='card'>" + n.content + "</div>";
    if((n.children||[]).length) h += "<ul>" + n.children.map(nodeHtml).join("") + "</ul>";
    return h + "</li>";
  }
  function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;"); }
  const s = doc.settings;
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${esc(doc.tree.title)}</title><style>

/* OKF bundle */
document.getElementById('btnExportOkf').onclick = async () => {
  const zip = new JSZip();
  const ts = new Date().toISOString();
  (function walk(n, path){
    if(n.type === "folder"){
      const p = path + safeName(n.title) + "/";
      zip.folder(p);
      (n.children||[]).forEach(c => walk(c, p));
    }else{
      const body = htmlToMd(n.content);
      const desc = stripHtml(n.content).slice(0, 100);
      const md = `---\ntype: note\ntitle: "${(n.title||"").replace(/"/g,'\\"')}"\ndescription: "${desc.replace(/"/g,'\\"')}"\ntags: []\ntimestamp: ${ts}\n---\n\n${body}\n`;
      zip.file(path + safeName(n.title) + ".md", md);
      (n.children||[]).forEach(c => walk(c, path));
    }
  })(doc.tree, "");
  const blob = await zip.generateAsync({ type: "blob" });
  download(blob, baseName() + " OKF.zip");
};

/* Reset */
document.getElementById('btnReset').onclick = () => {
  if(confirm("確定清除全部內容並重新開始?")){
    doc = freshDoc();
    applySettings(); render(); markDirty();
  }
};

/* ================= Boot ================= */
(async function init(){
  await openIDB();
  const cloud = await pullCloud();
  if(cloud) { doc = cloud; setStatus("ok"); }
  else {
    const local = await idbGet();
    if(local && local.tree) doc = local;
  }
  applySettings();
  render();
})();
</script>
