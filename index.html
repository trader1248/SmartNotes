<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>文章卡片樹</title>
<style>
:root{
  --font:'PingFang TC','Noto Sans TC',system-ui,sans-serif;
  --fs:12px;
  --indent:20px;
  --border:#d4af37;
  --gold:#d4af37;
  --bg:#101014;
  --bg2:#17171d;
  --ink:#e8e2d0;
  --dim:#8a8474;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:var(--font);font-size:var(--fs);line-height:1.35}
#top{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;
  padding:4px 10px;background:var(--bg);border-bottom:1px solid rgba(212,175,55,.35)}
#top b{color:var(--gold);font-size:calc(var(--fs) + 1px);letter-spacing:.5px}
#dot{width:9px;height:9px;border-radius:50%;background:#555;transition:background .3s}
#dot.syncing{background:var(--gold);box-shadow:0 0 6px var(--gold)}
#dot.ok{background:#2ecc71}
#dot.err{background:#ff5b5b;box-shadow:0 0 6px #ff5b5b}

#tree{padding:8px 10px 120px;max-width:900px}
.row{display:flex;align-items:center;gap:5px;min-height:20px;border-radius:4px;padding:1px 2px}
.row:hover{background:rgba(212,175,55,.06)}
.node{margin-left:var(--indent)}
#tree>.node{margin-left:0}

/* 摺疊圓點:光暈外框 */
.tg{flex:none;width:9px;height:9px;border-radius:50%;cursor:pointer;
  border:1.5px solid var(--gold);box-shadow:0 0 5px rgba(212,175,55,.7);
  background:transparent;transition:background .15s}
.tg.open{background:var(--gold)}
.tg.leaf{border-color:var(--dim);box-shadow:none;opacity:.45;cursor:default}

.title{font-weight:700;outline:none;cursor:text;padding:0 2px;border-radius:3px;min-width:2em}
.title:focus{background:rgba(212,175,55,.1)}
.folder>.row>.title{color:var(--gold)}

/* 行內編輯按鈕:hover 才顯示 */
.tools{display:flex;align-items:center;gap:2px;opacity:0;transition:opacity .15s}
.row:hover .tools,.tools:focus-within{opacity:1}
button,select{font-family:var(--font);font-size:calc(var(--fs) - 1px);color:var(--ink);
  background:transparent;border:1px solid transparent;border-radius:4px;cursor:pointer;padding:1px 4px}
button:hover{border-color:rgba(212,175,55,.5);color:var(--gold)}
select{background:var(--bg2);border:1px solid rgba(212,175,55,.35)}
select:hover{border-color:var(--gold)}
.drag{cursor:grab;color:var(--dim)}
.row.dropinto{outline:1px dashed var(--gold)}
.row.dropafter{box-shadow:0 2px 0 var(--gold)}

/* 文章卡片內文 */
.card-body{margin:2px 0 4px calc(var(--indent) + 2px)}
.content{border:1px solid var(--border);border-radius:7px;background:var(--bg2);
  padding:6px 9px;outline:none;min-height:1.4em}
.content ul{padding-left:var(--indent)}
.content li{margin:0}
.fmtbar{display:none;gap:2px;margin:0 0 2px calc(var(--indent) + 2px)}
.fmtbar.show{display:flex}
.fmtbar button{border:1px solid rgba(212,175,55,.3)}

/* 底部控制列 */
#panelWrap{position:fixed;left:0;right:0;bottom:0;z-index:6}
#panelToggle{position:absolute;right:10px;bottom:8px;font-size:14px;background:var(--bg2);
  border:1px solid rgba(212,175,55,.5);border-radius:50%;width:26px;height:26px}
#panel{display:none;background:var(--bg2);border-top:1px solid rgba(212,175,55,.4);
  padding:5px 10px 8px 10px}
#panel.show{display:block}
#panel .prow{display:flex;flex-wrap:wrap;align-items:center;gap:6px;padding:2px 0}
#panel .prow+.prow{border-top:1px solid rgba(212,175,55,.15)}
#panel label{color:var(--dim);font-size:calc(var(--fs) - 1px)}
#panel button{border:1px solid rgba(212,175,55,.35)}
.hidden-input{display:none}
</style>
</head>
<body>

<div id="top"><b>文章卡片樹</b><span id="dot" title="同步狀態"></span></div>
<div id="tree"></div>

<div id="panelWrap">
  <div id="panel">
    <div class="prow">
      <button onclick="exportJSON()">⬇ 匯出 JSON</button>
      <button onclick="fileInput.click()">⬆ 匯入 JSON</button>
      <button onclick="exportText()">📄 匯出文字</button>
      <button onclick="exportHTML()">🌐 匯出 HTML</button>
      <button onclick="exportMD()">Ⓜ 匯出 Markdown</button>
      <button onclick="exportOKF()">🗂 匯出 OKF Bundle</button>
      <button onclick="resetAll()" style="color:#ff8b8b">♻ 重設</button>
      <input id="fileInput" class="hidden-input" type="file" accept=".json,application/json" onchange="importJSON(this)">
    </div>
    <div class="prow">
      <label>字體</label>
      <select id="sFont" onchange="applySetting('font',this.value)">
        <option>PingFang TC</option><option>Noto Sans TC</option><option>system-ui</option>
        <option>Georgia</option><option>serif</option><option>monospace</option>
      </select>
      <label>字號</label>
      <select id="sSize" onchange="applySetting('size',+this.value)">
        <option>11</option><option selected>12</option><option>13</option><option>14</option><option>16</option>
      </select>
      <label>縮排</label>
      <select id="sIndent" onchange="applySetting('indent',+this.value)">
        <option>12</option><option>16</option><option selected>20</option><option>24</option><option>28</option>
      </select>
      <label>邊框色</label>
      <select id="sBorder" onchange="applySetting('border',this.value)">
        <option value="#d4af37">金</option><option value="#40e0d0">湖水綠</option>
        <option value="#54a0ff">藍</option><option value="#a29bfe">紫</option><option value="#555555">灰</option>
      </select>
    </div>
    <div class="prow">
      <label>展開</label>
      <button title="展開 1 層" onclick="expandTo(1)">①</button>
      <button title="展開 2 層" onclick="expandTo(2)">②</button>
      <button title="展開 3 層" onclick="expandTo(3)">③</button>
      <button title="展開全部" onclick="expandTo(99)">⊞</button>
      <button title="全部收合" onclick="collapseAll()">⊟</button>
    </div>
  </div>
  <button id="panelToggle" title="控制列" onclick="panel.classList.toggle('show')">⚙</button>
</div>

<script>
/* ================= 資料 ================= */
const SB_URL='https://bxeraximugvvpkpaejdn.supabase.co';
const SB_KEY='sb_publishable_i8jvS_ivsLBzYwb2HAKk1Q_d4DtCHjX';
const HB={apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':'application/json'};
const COLORS=[['預設',''],['金','#d4af37'],['橙','#ff9f43'],['藍','#54a0ff'],['湖水綠','#40e0d0'],
  ['黃','#feca57'],['綠','#2ecc71'],['紫','#a29bfe'],['紅','#ff6b6b']];
const uid=()=>Math.random().toString(36).slice(2,10);
const defaultTree=()=>({settings:{font:'PingFang TC',size:12,indent:20,border:'#d4af37'},
  root:{id:'root',type:'folder',title:'根目錄',collapsed:false,children:[]}});
let tree=defaultTree();
const showFmt=new Set();

/* ================= 樹操作 ================= */
function find(id,node=tree.root,parent=null){
  if(node.id===id)return{node,parent};
  for(const c of node.children||[]){const r=find(id,c,node);if(r)return r;}
  return null;
}
function isDesc(aId,bId){ // b 是否為 a 的子孫
  const a=find(aId).node;let hit=false;
  (function w(n){if(n.id===bId)hit=true;(n.children||[]).forEach(w);})(a);
  return hit;
}
function addNode(pid,type){
  const p=find(pid).node;
  const n=type==='folder'
    ?{id:uid(),type:'folder',title:'新資料夾',collapsed:false,children:[]}
    :{id:uid(),type:'card',title:'新文章',collapsed:false,color:'',content:'<ul><li>要點</li></ul>'};
  p.children.push(n);p.collapsed=false;render();sync();
}
function delNode(id){
  const{node,parent}=find(id);
  if(!parent)return;
  if(!confirm(`刪除「${node.title}」及其所有內容?`))return;
  parent.children.splice(parent.children.indexOf(node),1);render();sync();
}
function moveNode(id,targetId,mode){ // mode: into | after
  if(id===targetId||isDesc(id,targetId))return;
  const{node,parent}=find(id);if(!parent)return;
  parent.children.splice(parent.children.indexOf(node),1);
  const t=find(targetId);
  if(mode==='into'){t.node.children.push(node);t.node.collapsed=false;}
  else t.parent.children.splice(t.parent.children.indexOf(t.node)+1,0,node);
  render();sync();
}
function expandTo(n){(function w(nd,d){nd.collapsed=d>=n;(nd.children||[]).forEach(c=>w(c,d+1));})(tree.root,0);render();sync();}
function collapseAll(){(function w(nd){nd.collapsed=true;(nd.children||[]).forEach(w);})(tree.root);render();sync();}

/* ================= 渲染 ================= */
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function render(){
  const host=document.getElementById('tree');host.innerHTML='';
  host.appendChild(renderNode(tree.root));
}
function renderNode(n){
  const wrap=document.createElement('div');
  wrap.className='node '+n.type;wrap.dataset.id=n.id;
  const hasKids=n.type==='folder'?(n.children.length>0):true;

  const row=document.createElement('div');row.className='row';row.draggable=(n.id!=='root');
  const tg=document.createElement('span');
  tg.className='tg'+(n.collapsed?'':' open')+(hasKids?'':' leaf');
  if(hasKids)tg.onclick=()=>{n.collapsed=!n.collapsed;render();sync();};
  row.appendChild(tg);

  const ti=document.createElement('span');
  ti.className='title';ti.contentEditable=true;ti.spellcheck=false;
  ti.textContent=n.title;if(n.color)ti.style.color=n.color;
  ti.oninput=()=>{n.title=ti.textContent;sync();};
  ti.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();ti.blur();}};
  row.appendChild(ti);

  const tools=document.createElement('span');tools.className='tools';
  const btn=(txt,tip,fn)=>{const b=document.createElement('button');b.textContent=txt;b.title=tip;b.onclick=fn;tools.appendChild(b);};
  if(n.type==='folder'){btn('＋卡','新增文章卡',()=>addNode(n.id,'card'));btn('＋夾','新增子資料夾',()=>addNode(n.id,'folder'));}
  else btn('¶','顯示/隱藏格式列',()=>{showFmt.has(n.id)?showFmt.delete(n.id):showFmt.add(n.id);render();});
  const sel=document.createElement('select');sel.title='文字顏色';
  COLORS.forEach(([name,v])=>{const o=document.createElement('option');o.value=v;o.textContent=name;
    if(v)o.style.color=v;if((n.color||'')===v)o.selected=true;sel.appendChild(o);});
  sel.onchange=()=>{n.color=sel.value;render();sync();};
  tools.appendChild(sel);
  if(n.id!=='root')btn('✕','刪除',()=>delNode(n.id));
  row.appendChild(tools);

  /* 拖移 */
  row.ondragstart=e=>{e.dataTransfer.setData('text/plain',n.id);e.stopPropagation();};
  row.ondragover=e=>{e.preventDefault();e.stopPropagation();
    row.classList.toggle('dropinto',n.type==='folder');
    row.classList.toggle('dropafter',n.type!=='folder');};
  row.ondragleave=()=>row.classList.remove('dropinto','dropafter');
  row.ondrop=e=>{e.preventDefault();e.stopPropagation();row.classList.remove('dropinto','dropafter');
    moveNode(e.dataTransfer.getData('text/plain'),n.id,n.type==='folder'?'into':'after');};

  wrap.appendChild(row);

  if(n.type==='card'&&!n.collapsed){
    const bar=document.createElement('div');bar.className='fmtbar'+(showFmt.has(n.id)?' show':'');
    const fb=(txt,tip,cmd,val)=>{const b=document.createElement('button');b.textContent=txt;b.title=tip;
      b.onmousedown=e=>e.preventDefault();b.onclick=()=>document.execCommand(cmd,false,val||null);bar.appendChild(b);};
    fb('B','粗體','bold');fb('I','斜體','italic');fb('•','項目符號','insertUnorderedList');
    fb('→','增加縮排','indent');fb('←','減少縮排','outdent');
    const cs=document.createElement('select');cs.title='選取文字顏色';
    COLORS.forEach(([name,v])=>{const o=document.createElement('option');o.value=v||'inherit';o.textContent=name;
      if(v)o.style.color=v;cs.appendChild(o);});
    cs.onmousedown=e=>e.stopPropagation();
    cs.onchange=()=>{document.execCommand('foreColor',false,cs.value);};
    bar.appendChild(cs);
    wrap.appendChild(bar);

    const body=document.createElement('div');body.className='card-body';
    const ct=document.createElement('div');ct.className='content';ct.contentEditable=true;ct.spellcheck=false;
    ct.innerHTML=n.content||'';
    ct.oninput=()=>{n.content=ct.innerHTML;sync(false);};
    body.appendChild(ct);wrap.appendChild(body);
  }
  if(n.type==='folder'&&!n.collapsed)
    n.children.forEach(c=>wrap.appendChild(renderNode(c)));
  return wrap;
}

/* ================= 設定 ================= */
function applySetting(k,v){tree.settings[k]=v;paintSettings();sync();}
function paintSettings(){
  const s=tree.settings,r=document.documentElement.style;
  r.setProperty('--font',`'${s.font}','Noto Sans TC',system-ui,sans-serif`);
  r.setProperty('--fs',s.size+'px');
  r.setProperty('--indent',s.indent+'px');
  r.setProperty('--border',s.border);
  sFont.value=s.font;sSize.value=s.size;sIndent.value=s.indent;sBorder.value=s.border;
}

/* ================= 同步:IndexedDB + Supabase ================= */
const dot=document.getElementById('dot');
function setDot(c){dot.className=c;}
function idb(){return new Promise((res,rej)=>{const q=indexedDB.open('atree',1);
  q.onupgradeneeded=e=>e.target.result.createObjectStore('kv');
  q.onsuccess=e=>res(e.target.result);q.onerror=rej;});}
async function localSave(){try{const db=await idb();
  db.transaction('kv','readwrite').objectStore('kv').put(JSON.parse(JSON.stringify(tree)),'tree');}catch(e){}}
async function localLoad(){try{const db=await idb();
  return await new Promise(res=>{const q=db.transaction('kv').objectStore('kv').get('tree');
    q.onsuccess=()=>res(q.result||null);q.onerror=()=>res(null);});}catch(e){return null;}}
let timer=null,retry=null;
function sync(rerender){ // 每次編輯:立即寫本地,1.5 秒防抖後上雲
  localSave();setDot('syncing');
  clearTimeout(timer);clearTimeout(retry);
  timer=setTimeout(push,1500);
}
async function push(){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/docs?on_conflict=id`,{method:'POST',
      headers:{...HB,Prefer:'resolution=merge-duplicates,return=minimal'},
      body:JSON.stringify([{id:'main',data:tree,updated_at:new Date().toISOString()}])});
    if(!r.ok)throw 0;
    setDot('ok');
  }catch(e){setDot('err');retry=setTimeout(push,5000);}
}
async function cloudLoad(){
  const r=await fetch(`${SB_URL}/rest/v1/docs?id=eq.main&select=data`,{headers:HB});
  if(!r.ok)throw 0;const j=await r.json();return j.length?j[0].data:null;
}
async function boot(){ // 載入優先序:雲端 → 本地 → 全新
  let t=null;
  try{t=await cloudLoad();if(t)setDot('ok');}catch(e){}
  if(!t){t=await localLoad();if(!t)t=defaultTree();}
  if(!t.settings)t.settings=defaultTree().settings;
  tree=t;paintSettings();render();
}
boot();

/* ================= 匯出 ================= */
async function saveFile(name,data,type){
  const blob=data instanceof Blob?data:new Blob([data],{type:type||'text/plain'});
  if(window.showSaveFilePicker){
    try{const h=await showSaveFilePicker({suggestedName:name});
      const w=await h.createWritable();await w.write(blob);await w.close();return;}
    catch(e){if(e.name==='AbortError')return;}
  }
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();
}
function exportJSON(){saveFile('article-tree.json',JSON.stringify(tree,null,2),'application/json');}
function importJSON(inp){
  const f=inp.files[0];if(!f)return;
  f.text().then(t=>{const j=JSON.parse(t);
    if(!j.root||j.root.type!=='folder')throw 0;
    tree=j;if(!tree.settings)tree.settings=defaultTree().settings;
    paintSettings();render();sync();
  }).catch(()=>alert('僅接受本應用匯出的 JSON 格式'));
  inp.value='';
}
function resetAll(){if(!confirm('清空全部內容並重新開始?'))return;
  tree=defaultTree();paintSettings();render();sync();}

function plain(html){const d=document.createElement('div');d.innerHTML=html;
  d.querySelectorAll('li').forEach(li=>li.prepend('- '));
  d.querySelectorAll('li,div,p,br').forEach(el=>el.after('\n'));
  return d.textContent.replace(/\n{3,}/g,'\n\n').trim();}
function exportText(){
  let out='';
  (function w(n,d){out+='  '.repeat(d)+(n.type==='folder'?'[夾] ':'')+n.title+'\n';
    if(n.type==='card'&&n.content)out+=plain(n.content).split('\n').map(l=>'  '.repeat(d+1)+l).join('\n')+'\n';
    (n.children||[]).forEach(c=>w(c,d+1));})(tree.root,0);
  saveFile('article-tree.txt',out);
}
function exportHTML(){
  const s=tree.settings;
  let body='';
  (function w(n,d){
    if(n.type==='folder'){body+=`<h${Math.min(d+1,6)} style="color:#d4af37">${esc(n.title)}</h${Math.min(d+1,6)}>`;
      (n.children||[]).forEach(c=>w(c,d+1));}
    else body+=`<div class="card"><b style="color:${n.color||'#e8e2d0'}">${esc(n.title)}</b>${n.content||''}</div>`;
  })(tree.root,0);
  const doc=`<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="utf-8"><title>${esc(tree.root.title)}</title>
<style>body{background:#101014;color:#e8e2d0;font-family:'${s.font}',sans-serif;font-size:${s.size}px;max-width:820px;margin:20px auto;padding:0 16px}
h1,h2,h3,h4,h5,h6{margin:.6em 0 .2em}
.card{border:1px solid ${s.border};border-radius:7px;background:#17171d;padding:6px 10px;margin:6px 0}
ul{padding-left:${s.indent}px}</style></head><body>${body}</body></html>`;
  saveFile('article-tree.html',doc,'text/html');
}

/* HTML → Markdown */
function htmlToMd(html){
  const d=document.createElement('div');d.innerHTML=html;
  function inline(n){let s='';
    n.childNodes.forEach(c=>{
      if(c.nodeType===3){s+=c.textContent;return;}
      const t=c.tagName;
      if(t==='B'||t==='STRONG')s+='**'+inline(c)+'**';
      else if(t==='I'||t==='EM')s+='*'+inline(c)+'*';
      else if(t==='BR')s+='\n';
      else if(t==='UL')s+='\n'+block(c,0);
      else if(t==='DIV'||t==='P')s+=inline(c)+'\n';
      else s+=inline(c);
    });return s;}
  function block(ul,depth){let s='';
    Array.from(ul.children).forEach(li=>{
      if(li.tagName!=='LI')return;
      let text='',subs='';
      li.childNodes.forEach(c=>{
        if(c.tagName==='UL')subs+=block(c,depth+1);
        else text+=c.nodeType===3?c.textContent:inline(c);});
      s+='  '.repeat(depth)+'- '+text.trim()+'\n'+subs;});
    return s;}
  return inline(d).replace(/\n{3,}/g,'\n\n').trim();
}
function exportMD(){
  let out='';
  (function w(n,d){
    if(n.type==='folder'){out+='#'.repeat(Math.min(d+1,6))+' '+n.title+'\n\n';
      (n.children||[]).forEach(c=>w(c,d+1));}
    else out+='**'+n.title+'**\n\n'+htmlToMd(n.content||'')+'\n\n';
  })(tree.root,0);
  saveFile('article-tree.md',out,'text/markdown');
}

/* OKF Bundle:zip(不壓縮) */
const CRCT=(()=>{const t=[];for(let i=0;i<256;i++){let c=i;
  for(let k=0;k<8;k++)c=c&1?0xEDB88320^(c>>>1):c>>>1;t[i]=c>>>0;}return t;})();
function crc32(u8){let c=~0;for(let i=0;i<u8.length;i++)c=CRCT[(c^u8[i])&255]^(c>>>8);return ~c>>>0;}
function zip(files){
  const enc=new TextEncoder(),parts=[],central=[];let off=0;
  for(const f of files){
    const name=enc.encode(f.path),data=enc.encode(f.text),crc=crc32(data);
    const lh=new DataView(new ArrayBuffer(30));
    lh.setUint32(0,0x04034b50,true);lh.setUint16(4,20,true);lh.setUint16(6,0x0800,true);
    lh.setUint32(14,crc,true);lh.setUint32(18,data.length,true);lh.setUint32(22,data.length,true);
    lh.setUint16(26,name.length,true);
    parts.push(new Uint8Array(lh.buffer),name,data);
    const ch=new DataView(new ArrayBuffer(46));
    ch.setUint32(0,0x02014b50,true);ch.setUint16(4,20,true);ch.setUint16(6,20,true);ch.setUint16(8,0x0800,true);
    ch.setUint32(16,crc,true);ch.setUint32(20,data.length,true);ch.setUint32(24,data.length,true);
    ch.setUint16(28,name.length,true);ch.setUint32(42,off,true);
    central.push(new Uint8Array(ch.buffer),name);
    off+=30+name.length+data.length;
  }
  const cdSize=central.reduce((s,c)=>s+c.length,0);
  const end=new DataView(new ArrayBuffer(22));
  end.setUint32(0,0x06054b50,true);end.setUint16(8,files.length,true);end.setUint16(10,files.length,true);
  end.setUint32(12,cdSize,true);end.setUint32(16,off,true);
  return new Blob([...parts,...central,new Uint8Array(end.buffer)],{type:'application/zip'});
}
function safeName(s){return (s||'untitled').replace(/[\\/:*?"<>|#]/g,'_').trim()||'untitled';}
function exportOKF(){
  const files=[],now=new Date().toISOString();
  (function w(n,path){
    if(n.type==='folder'){
      const p=path+safeName(n.title)+'/';
      n.children.forEach(c=>w(c,p));
    }else{
      const md=htmlToMd(n.content||'');
      const desc=md.split('\n')[0].replace(/^[-*\s]+/,'').replace(/"/g,'\\"').slice(0,100);
      files.push({path:path+safeName(n.title)+'.md',
        text:`---\ntype: article\ntitle: "${n.title.replace(/"/g,'\\"')}"\ndescription: "${desc}"\ntags: []\ntimestamp: ${now}\n---\n\n${md}\n`});
    }
  })(tree.root,'');
  if(!files.length)files.push({path:safeName(tree.root.title)+'/README.md',text:'# empty\n'});
  saveFile('okf-bundle.zip',zip(files),'application/zip');
}
</script>
