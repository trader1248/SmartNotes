<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>文章樹 Article Tree</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{
  --bg:#131108; --bg2:#1a170c; --gold:#d4af37; --gold-dim:rgba(212,175,55,.35);
  --gold-faint:rgba(212,175,55,.14); --text:#e8e2cf; --muted:#9a9070;
  --font:'PingFang TC','PingFang SC','Microsoft JhengHei',sans-serif;
  --fs:12px; --indent:18px; --border:#d4af37;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:var(--fs);line-height:1.35}
body{padding:8px 10px 90px 10px}
header{display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--gold-dim);padding-bottom:4px;margin-bottom:6px}
header .app{color:var(--gold);font-weight:600;letter-spacing:1px}
#dot{width:9px;height:9px;border-radius:50%;margin-left:auto;background:#777;transition:background .3s}
#dot.gold{background:var(--gold);box-shadow:0 0 6px var(--gold)}
#dot.green{background:#2ecc71}
#dot.red{background:#e74c3c;box-shadow:0 0 6px #e74c3c}

/* ---------- tree ---------- */
#tree{max-width:860px}
.node{position:relative}
.children{margin-left:var(--indent);border-left:1px solid var(--gold-faint);padding-left:6px}
.row{display:flex;align-items:center;gap:5px;padding:1px 2px;border-radius:4px;min-height:20px}
.row:hover{background:var(--gold-faint)}
.row.drop-into{outline:1px solid var(--gold)}
.row.drop-before{box-shadow:0 -2px 0 var(--gold)}
.row.drop-after{box-shadow:0 2px 0 var(--gold)}

/* toggle bullet with halo */
.tgl{width:14px;height:14px;flex:0 0 14px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer}
.tgl::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--gold)}
.tgl.closed.has-kids{background:var(--gold-dim);box-shadow:0 0 5px var(--gold-dim)}
.tgl.leaf::before{width:5px;height:5px;background:var(--muted)}

.title{font-weight:700;outline:none;cursor:text;min-width:20px;padding:0 2px;white-space:pre-wrap}
.title:focus{border-bottom:1px dotted var(--gold)}
.node[data-type=folder]>.row .title{color:var(--gold)}

/* hidden inline edit buttons */
.acts{display:none;gap:2px;margin-left:2px}
.row:hover .acts, .cardbar:hover .acts{display:inline-flex}
.ibtn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;line-height:1;padding:1px 3px;border-radius:3px}
.ibtn:hover{color:var(--gold);background:rgba(212,175,55,.12)}
.ibtn.danger:hover{color:#e74c3c}

/* article card */
.cardbody{margin:2px 0 4px calc(var(--indent) + 2px);border:1px solid var(--gold-dim);border-radius:6px;background:var(--bg2);padding:4px 8px}
.toolbar{display:none;gap:3px;flex-wrap:wrap;border-bottom:1px solid var(--gold-faint);padding-bottom:3px;margin-bottom:3px}
.toolbar.show{display:flex}
.toolbar .ibtn{font-weight:600}
.cbtn{width:14px;height:14px;border-radius:50%;border:none;cursor:pointer;padding:0}
.rt{outline:none;min-height:16px}
.rt ul{margin-left:var(--indent)}
.rt li{margin:0}
.rt b,.rt strong{color:inherit}

/* ---------- bottom panel ---------- */
#panelwrap{position:fixed;left:0;right:0;bottom:0;background:var(--bg2);border-top:1px solid var(--gold-dim)}
#paneltoggle{display:block;margin:0 auto;background:none;border:none;color:var(--gold);cursor:pointer;font-size:12px;padding:2px 10px}
#panel{display:none;padding:4px 10px 8px;max-width:900px;margin:0 auto}
#panel.show{display:block}
.prow{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:2px 0}
.prow+.prow{border-top:1px solid var(--gold-faint)}
.pbtn{background:none;border:1px solid var(--gold-dim);border-radius:5px;color:var(--text);cursor:pointer;font-size:12px;font-family:var(--font);padding:2px 8px}
.pbtn:hover{border-color:var(--gold);color:var(--gold)}
select{background:var(--bg);color:var(--text);border:1px solid var(--gold-dim);border-radius:5px;font-size:12px;font-family:var(--font);padding:1px 4px}
input[type=color]{width:24px;height:20px;border:1px solid var(--gold-dim);border-radius:4px;background:none;padding:0;cursor:pointer}
.plabel{color:var(--muted)}
</style>
</head>
<body>
<header><span class="app">文章樹</span><span id="dot" title="同步狀態"></span></header>
<div id="tree"></div>

<div id="panelwrap">
  <button id="paneltoggle" title="顯示/隱藏控制列">▴ 控制列</button>
  <div id="panel">
    <div class="prow">
      <span class="plabel">檔案</span>
      <button class="pbtn" onclick="exportJSON()">⬇ 匯出 JSON</button>
      <button class="pbtn" onclick="importJSON()">⬆ 匯入 JSON</button>
      <button class="pbtn" onclick="exportText()">📄 匯出文字</button>
      <button class="pbtn" onclick="exportHTML()">🌐 匯出 HTML</button>
      <button class="pbtn" onclick="exportMD()">Ⓜ 匯出 Markdown</button>
      <button class="pbtn" onclick="exportOKF()">🗂 匯出 OKF Bundle</button>
      <button class="pbtn" onclick="resetAll()" style="margin-left:auto;color:#e74c3c">✖ 重設</button>
    </div>
    <div class="prow">
      <span class="plabel">樣式</span>
      <select id="selFont" onchange="setStyleVar('font',this.value)">
        <option value="'PingFang TC','PingFang SC',sans-serif">PingFang TC</option>
        <option value="'Microsoft JhengHei',sans-serif">微軟正黑</option>
        <option value="'Noto Sans TC',sans-serif">Noto Sans TC</option>
        <option value="'Songti TC',serif">宋體</option>
        <option value="Georgia,serif">Georgia</option>
        <option value="Menlo,monospace">Monospace</option>
      </select>
      <select id="selSize" onchange="setStyleVar('fs',this.value)">
        <option>11px</option><option selected>12px</option><option>13px</option><option>14px</option><option>16px</option>
      </select>
      <select id="selIndent" onchange="setStyleVar('indent',this.value)">
        <option>12px</option><option selected>18px</option><option>24px</option><option>32px</option>
      </select>
      <span class="plabel">邊框色</span>
      <input type="color" id="selBorder" value="#d4af37" onchange="setStyleVar('border',this.value)">
    </div>
    <div class="prow">
      <span class="plabel">展開</span>
      <button class="pbtn" onclick="expandTo(1)" title="展開1層">1▾</button>
      <button class="pbtn" onclick="expandTo(2)" title="展開2層">2▾</button>
      <button class="pbtn" onclick="expandTo(3)" title="展開3層">3▾</button>
      <button class="pbtn" onclick="expandTo(99)" title="全部展開">⊞</button>
      <button class="pbtn" onclick="expandTo(0)" title="全部收合">⊟</button>
    </div>
  </div>
</div>

<script>
/* ================= config ================= */
const SUPA_URL='https://bxeraximugvvpkpaejdn.supabase.co';
const SUPA_KEY='sb_publishable_i8jvS_ivsLBzYwb2HAKk1Q_d4DtCHjX';
const TABLE='article_tree', ROW_ID='main';
const HDRS={'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'};

/* ================= state ================= */
const uid=()=>Math.random().toString(36).slice(2,10);
function defaultState(){return{settings:{font:"'PingFang TC','PingFang SC',sans-serif",fs:'12px',indent:'18px',border:'#d4af37'},
 root:{id:uid(),type:'folder',title:'根資料夾',open:true,children:[]}};}
let state=defaultState();

/* ================= IndexedDB ================= */
function idb(){return new Promise((res,rej)=>{const r=indexedDB.open('atree',1);
 r.onupgradeneeded=()=>r.result.createObjectStore('kv');
 r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);});}
async function idbPut(v){try{const db=await idb();db.transaction('kv','readwrite').objectStore('kv').put(v,'state');}catch(e){}}
async function idbGet(){try{const db=await idb();return await new Promise(res=>{const q=db.transaction('kv').objectStore('kv').get('state');q.onsuccess=()=>res(q.result);q.onerror=()=>res(null);});}catch(e){return null}}

/* ================= sync ================= */
let timer=null, retryTimer=null;
const dot=c=>{const d=document.getElementById('dot');d.className=c;}
function scheduleSave(){ idbPut(JSON.parse(JSON.stringify(state))); dot('gold');
  clearTimeout(timer); timer=setTimeout(pushCloud,1500); }
async function pushCloud(){
  clearTimeout(retryTimer);
  try{
    const r=await fetch(SUPA_URL+'/rest/v1/'+TABLE,{method:'POST',
      headers:{...HDRS,'Prefer':'resolution=merge-duplicates,return=minimal'},
      body:JSON.stringify({id:ROW_ID,data:state,updated_at:new Date().toISOString()})});
    if(!r.ok)throw 0; dot('green');
  }catch(e){ dot('red'); retryTimer=setTimeout(pushCloud,5000); }
}
async function loadState(){
  try{
    const r=await fetch(SUPA_URL+'/rest/v1/'+TABLE+'?id=eq.'+ROW_ID+'&select=data',{headers:HDRS});
    if(r.ok){const j=await r.json(); if(j.length&&j[0].data&&j[0].data.root){state=j[0].data;dot('green');return;}}
    throw 0;
  }catch(e){
    const local=await idbGet();
    if(local&&local.root){state=local;dot('red');}else{state=defaultState();dot('red');}
    retryTimer=setTimeout(pushCloud,5000);
  }
}

/* ================= tree helpers ================= */
function findParent(node,id,parent=null){ if(node.id===id)return parent;
  for(const c of node.children||[]){const r=findParent(c,id,node);if(r!==undefined&&r!==false)return r;} return false;}
function findNode(node,id){ if(node.id===id)return node;
  for(const c of node.children||[]){const r=findNode(c,id);if(r)return r;} return null;}
function isDescendant(a,id){ if(a.id===id)return true; return (a.children||[]).some(c=>isDescendant(c,id)); }

/* ================= render ================= */
const treeEl=document.getElementById('tree');
function render(){ treeEl.innerHTML=''; treeEl.appendChild(renderNode(state.root,true)); applySettings(); }

function renderNode(n,isRoot){
  const el=document.createElement('div'); el.className='node'; el.dataset.id=n.id; el.dataset.type=n.type;
  const row=document.createElement('div'); row.className='row'; row.draggable=!isRoot;
  const kids=n.children&&n.children.length;
  const tgl=document.createElement('span');
  tgl.className='tgl '+(n.open?'open':'closed')+((kids||n.type==='card')?' has-kids':' leaf');
  tgl.title=n.open?'收合':'展開';
  tgl.onclick=()=>{n.open=!n.open;render();scheduleSave();};
  const title=document.createElement('span'); title.className='title'; title.contentEditable='true';
  title.spellcheck=false; title.textContent=n.title;
  title.oninput=()=>{n.title=title.textContent;scheduleSave();};
  title.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();title.blur();}};
  const acts=document.createElement('span'); acts.className='acts';
  const btn=(txt,tip,fn,danger)=>{const b=document.createElement('button');b.className='ibtn'+(danger?' danger':'');
    b.textContent=txt;b.title=tip;b.onclick=fn;acts.appendChild(b);}
  if(n.type==='folder'){
    btn('📄','新增文章卡',()=>{n.children.push({id:uid(),type:'card',title:'新文章',content:'',open:true,children:[]});n.open=true;render();scheduleSave();});
    btn('📁','新增子資料夾',()=>{n.children.push({id:uid(),type:'folder',title:'新資料夾',open:true,children:[]});n.open=true;render();scheduleSave();});
  }else{
    btn('Aa','顯示/隱藏格式列',()=>{el.querySelector('.toolbar').classList.toggle('show');});
  }
  if(!isRoot) btn('🗑','刪除',()=>{if(!confirm('刪除「'+n.title+'」及其內容？'))return;
    const p=findParent(state.root,n.id); p.children=p.children.filter(c=>c.id!==n.id); render();scheduleSave();},true);
  row.append(tgl,title,acts);
  el.appendChild(row);
  attachDnD(row,n,isRoot);

  if(n.type==='card'&&n.open){
    const body=document.createElement('div'); body.className='cardbody';
    const tb=document.createElement('div'); tb.className='toolbar cardbar';
    const tbtn=(txt,tip,cmd,val)=>{const b=document.createElement('button');b.className='ibtn';b.textContent=txt;b.title=tip;
      b.onmousedown=e=>{e.preventDefault();document.execCommand(cmd,false,val||null);};tb.appendChild(b);}
    tbtn('B','粗體','bold'); tbtn('I','斜體','italic'); tbtn('U','底線','underline');
    tbtn('•','項目符號','insertUnorderedList'); tbtn('→','增加縮排','indent'); tbtn('←','減少縮排','outdent');
    [['#ff9f43','橙'],['#54a0ff','藍'],['#1dd1a1','青綠'],['#a55eea','紫'],['#feca57','黃'],['#ff6b6b','紅'],['#2ecc71','綠'],['#e8e2cf','預設']]
      .forEach(([c,name])=>{const b=document.createElement('button');b.className='cbtn';b.style.background=c;b.title=name;
        b.onmousedown=e=>{e.preventDefault();document.execCommand('foreColor',false,c);};tb.appendChild(b);});
    const rt=document.createElement('div'); rt.className='rt'; rt.contentEditable='true'; rt.spellcheck=false;
    rt.innerHTML=n.content||'';
    rt.oninput=()=>{n.content=rt.innerHTML;scheduleSave();};
    body.append(tb,rt); el.appendChild(body);
  }
  if(n.type==='folder'&&n.open&&kids){
    const ch=document.createElement('div'); ch.className='children';
    n.children.forEach(c=>ch.appendChild(renderNode(c,false)));
    el.appendChild(ch);
  }
  return el;
}

/* ================= drag & drop ================= */
let dragId=null;
function attachDnD(row,n,isRoot){
  if(!isRoot){
    row.addEventListener('dragstart',e=>{dragId=n.id;e.stopPropagation();e.dataTransfer.effectAllowed='move';});
  }
  row.addEventListener('dragover',e=>{
    if(!dragId||dragId===n.id)return;
    const src=findNode(state.root,dragId);
    if(isDescendant(src,n.id))return;
    e.preventDefault();e.stopPropagation();
    row.classList.remove('drop-into','drop-before','drop-after');
    const r=row.getBoundingClientRect(), y=(e.clientY-r.top)/r.height;
    if(isRoot){row.classList.add('drop-into');}
    else if(y<0.3)row.classList.add('drop-before');
    else if(y>0.7)row.classList.add('drop-after');
    else row.classList.add(n.type==='folder'?'drop-into':'drop-after');
  });
  row.addEventListener('dragleave',()=>row.classList.remove('drop-into','drop-before','drop-after'));
  row.addEventListener('drop',e=>{
    e.preventDefault();e.stopPropagation();
    const mode=row.classList.contains('drop-into')?'into':row.classList.contains('drop-before')?'before':'after';
    row.classList.remove('drop-into','drop-before','drop-after');
    if(!dragId||dragId===n.id)return;
    const src=findNode(state.root,dragId);
    if(isDescendant(src,n.id))return;
    const sp=findParent(state.root,dragId);
    sp.children=sp.children.filter(c=>c.id!==dragId);
    if(mode==='into'){n.children=n.children||[];n.children.push(src);n.open=true;}
    else{const p=findParent(state.root,n.id);const i=p.children.findIndex(c=>c.id===n.id);
      p.children.splice(mode==='before'?i:i+1,0,src);}
    dragId=null; render(); scheduleSave();
  });
}

/* ================= settings ================= */
function applySettings(){
  const s=state.settings, r=document.documentElement.style;
  r.setProperty('--font',s.font); r.setProperty('--fs',s.fs);
  r.setProperty('--indent',s.indent); r.setProperty('--gold',s.border);
  r.setProperty('--gold-dim',s.border+'59'); r.setProperty('--gold-faint',s.border+'24');
  document.getElementById('selFont').value=s.font;
  document.getElementById('selSize').value=s.fs;
  document.getElementById('selIndent').value=s.indent;
  document.getElementById('selBorder').value=s.border;
}
function setStyleVar(k,v){state.settings[k]=v;applySettings();scheduleSave();}

/* ================= expand / collapse ================= */
function expandTo(depth){
  (function walk(n,d){ n.open = d<depth; (n.children||[]).forEach(c=>walk(c,d+1)); })(state.root,0);
  render(); scheduleSave();
}

/* ================= export helpers ================= */
async function saveFile(name,content,mime){
  if(window.showSaveFilePicker){
    try{const h=await showSaveFilePicker({suggestedName:name});
      const w=await h.createWritable(); await w.write(content); await w.close(); return;}catch(e){if(e.name==='AbortError')return;}
  }
  const blob=content instanceof Blob?content:new Blob([content],{type:mime});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),3000);
}
const stamp=()=>new Date().toISOString().slice(0,10);

function exportJSON(){ saveFile('article-tree-'+stamp()+'.json',JSON.stringify(state,null,2),'application/json'); }

function importJSON(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.json,application/json';
  inp.onchange=async()=>{ const f=inp.files[0]; if(!f)return;
    try{ const j=JSON.parse(await f.text());
      if(!j.root)throw 0; state=j; render(); scheduleSave();
    }catch(e){ alert('匯入失敗:不是有效的樹狀 JSON 檔'); } };
  inp.click();
}

function stripHTML(h){const d=document.createElement('div');d.innerHTML=h;
  d.querySelectorAll('li').forEach(li=>li.prepend('- '));
  d.querySelectorAll('div,p,li,br').forEach(x=>x.after('\n'));
  return d.textContent.replace(/\n{3,}/g,'\n\n').trim();}

function exportText(){
  let out='';
  (function walk(n,ind){ out+=ind+(n.type==='folder'?'📁 ':'')+n.title+'\n';
    if(n.type==='card'&&n.content){ out+=stripHTML(n.content).split('\n').map(l=>ind+'  '+l).join('\n')+'\n'; }
    (n.children||[]).forEach(c=>walk(c,ind+'  ')); })(state.root,'');
  saveFile('article-tree-'+stamp()+'.txt',out,'text/plain');
}

function exportHTML(){
  const s=state.settings;
  function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;');}
  function walk(n){
    if(n.type==='card')
      return '<details open><summary><b>'+esc(n.title)+'</b></summary><div class="card">'+(n.content||'')+'</div></details>';
    return '<details open><summary><b class="f">'+esc(n.title)+'</b></summary><div class="ch">'
      +(n.children||[]).map(walk).join('')+'</div></details>';
  }
  const html='<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><title>'+esc(state.root.title)+'</title><style>'
   +'body{background:#131108;color:#e8e2cf;font-family:'+s.font+';font-size:'+s.fs+';line-height:1.35;padding:12px}'
   +'summary{cursor:pointer;font-weight:700}.f{color:'+s.border+'}'
   +'.ch{margin-left:'+s.indent+';border-left:1px solid '+s.border+'40;padding-left:8px}'
   +'.card{border:1px solid '+s.border+'80;border-radius:6px;padding:4px 8px;margin:3px 0 5px '+s.indent+';background:#1a170c}'
   +'ul{margin-left:'+s.indent+'}</style></head><body>'+walk(state.root)+'</body></html>';
  saveFile('article-tree-'+stamp()+'.html',html,'text/html');
}

/* HTML -> Markdown (bold, italic, nested bullets) */
function htmlToMd(h){
  const d=document.createElement('div'); d.innerHTML=h||'';
  function conv(node,depth){
    let out='';
    node.childNodes.forEach(c=>{
      if(c.nodeType===3){out+=c.textContent;return;}
      const t=c.tagName;
      if(t==='B'||t==='STRONG')out+='**'+conv(c,depth)+'**';
      else if(t==='I'||t==='EM')out+='*'+conv(c,depth)+'*';
      else if(t==='U')out+=conv(c,depth);
      else if(t==='BR')out+='\n';
      else if(t==='UL'||t==='OL')out+='\n'+convList(c,depth);
      else if(t==='DIV'||t==='P')out+=conv(c,depth)+'\n';
      else out+=conv(c,depth);
    });
    return out;
  }
  function convList(ul,depth){
    let out='';
    ul.childNodes.forEach(li=>{
      if(li.tagName!=='LI')return;
      let inner='',subs='';
      li.childNodes.forEach(x=>{
        if(x.tagName==='UL'||x.tagName==='OL')subs+=convList(x,depth+1);
        else inner+=conv({childNodes:[x]},depth);
      });
      out+='  '.repeat(depth)+'- '+inner.trim()+'\n'+subs;
    });
    return out;
  }
  return conv(d,0).replace(/\n{3,}/g,'\n\n').trim();
}

function exportMD(){
  let out='';
  (function walk(n,lvl){
    if(n.type==='folder'){ out+='#'.repeat(Math.min(lvl,6))+' '+n.title+'\n\n'; (n.children||[]).forEach(c=>walk(c,lvl+1)); }
    else{ out+='**'+n.title+'**\n\n'+htmlToMd(n.content)+'\n\n'; }
  })(state.root,1);
  saveFile('article-tree-'+stamp()+'.md',out,'text/markdown');
}

function exportOKF(){
  const zip=new JSZip();
  const safe=t=>(t||'untitled').replace(/[\/\\:*?"<>|]/g,'_').trim()||'untitled';
  (function walk(n,dir){
    if(n.type==='folder'){
      const d=dir?dir.folder(safe(n.title)):zip.folder(safe(n.title));
      (n.children||[]).forEach(c=>walk(c,d));
    }else{
      const body=htmlToMd(n.content);
      const desc=body.split('\n')[0].replace(/["\n]/g,' ').slice(0,80);
      const md='---\ntype: article\ntitle: "'+n.title.replace(/"/g,'\\"')+'"\ndescription: "'+desc+'"\ntags: []\ntimestamp: '+new Date().toISOString()+'\n---\n\n# '+n.title+'\n\n'+body+'\n';
      (dir||zip).file(safe(n.title)+'.md',md);
    }
  })(state.root,null);
  zip.generateAsync({type:'blob'}).then(b=>saveFile('okf-bundle-'+stamp()+'.zip',b,'application/zip'));
}

function resetAll(){
  if(!confirm('確定清除全部內容並重新開始？此動作會同步到雲端。'))return;
  state=defaultState(); render(); scheduleSave();
}

/* ================= panel toggle ================= */
document.getElementById('paneltoggle').onclick=function(){
  const p=document.getElementById('panel'); p.classList.toggle('show');
  this.textContent=p.classList.contains('show')?'▾ 控制列':'▴ 控制列';
};

/* ================= boot ================= */
(async function(){ await loadState(); render(); })();
</script>
