<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章卡片樹</title>
<style>
:root{
  --gold:#C9A45C;
  --gold-dim:rgba(201,164,92,.35);
  --gold-halo:rgba(201,164,92,.22);
  --bg:#161310;
  --bg-card:#1C1814;
  --ink:#E8E2D6;
  --ink-dim:#9A9082;
  --fs:12px;
  --ff:"PingFang TC","PingFang SC","Heiti TC",-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--ff);
  font-size:var(--fs);
  line-height:1.6;
}
#app{max-width:860px;padding:20px 16px 110px 20px}

/* ---------- tree rows ---------- */
.node{position:relative}
.row{
  display:flex;align-items:center;gap:6px;
  padding:2px 4px;border-radius:4px;
  min-height:22px;
}
.row.drag-over-into{outline:1px solid var(--gold);outline-offset:-1px;background:rgba(201,164,92,.08)}
.row.drag-over-before{box-shadow:0 -1px 0 var(--gold)}
.row.drag-over-after{box-shadow:0 1px 0 var(--gold)}
.children{margin-left:18px}

/* toggle bullet with halo */
.bullet{
  width:16px;height:16px;flex:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border-radius:50%;
}
.bullet .dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--gold);
  transition:box-shadow .15s;
}
.bullet.leaf .dot{background:var(--gold-dim)}
.bullet.closed .dot{box-shadow:0 0 0 4px var(--gold-halo)}
.bullet:hover .dot{box-shadow:0 0 0 4px var(--gold-halo),0 0 6px var(--gold-dim)}

.type-ic{flex:none;width:12px;height:12px;color:var(--gold);opacity:.8}

.title{
  font-weight:700;cursor:text;outline:none;
  padding:0 3px;border-radius:3px;min-width:2em;
  white-space:pre-wrap;
}
.title:focus{background:rgba(201,164,92,.10);box-shadow:0 0 0 1px var(--gold-dim)}
.title:empty::before{content:"未命名";color:var(--ink-dim);font-weight:400}

/* hover-only action icons */
.acts{display:flex;gap:2px;margin-left:4px;opacity:0;transition:opacity .12s}
.row:hover .acts{opacity:1}
.ibtn{
  background:none;border:none;cursor:pointer;color:var(--ink-dim);
  width:18px;height:18px;border-radius:3px;
  display:flex;align-items:center;justify-content:center;padding:0;
}
.ibtn:hover{color:var(--gold);background:rgba(201,164,92,.12)}
.ibtn svg{width:11px;height:11px}
.ibtn.danger:hover{color:#C96A5C}

/* ---------- article card ---------- */
.card{
  margin:2px 0 6px 30px;
  border:1px solid var(--gold-dim);
  border-radius:5px;
  background:var(--bg-card);
  padding:6px 8px;
}
.card-tools{display:flex;gap:2px;margin-bottom:4px}
.card-tools.hidden{display:none}
.card-tools .ibtn{width:20px;height:20px;color:var(--gold)}
.card-tools .sep{width:1px;background:var(--gold-dim);margin:3px 4px}
.rich{
  outline:none;min-height:1.6em;
  color:var(--ink);
}
.rich:empty::before{content:"在此輸入內容⋯";color:var(--ink-dim)}
.rich ul{margin:2px 0 2px 1.3em}
.rich li{margin:1px 0}
.rich b,.rich strong{color:var(--gold)}
.rich a{color:var(--gold)}

/* ---------- bottom control bar ---------- */
#bar{
  position:fixed;left:0;right:0;bottom:0;
  background:rgba(22,19,16,.96);backdrop-filter:blur(6px);
  border-top:1px solid var(--gold-dim);
  padding:6px 16px 8px;
  display:flex;flex-direction:column;gap:5px;
  font-size:11px;
}
.bar-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.bar-label{color:var(--ink-dim);margin-right:2px}
.cbtn{
  display:inline-flex;align-items:center;gap:4px;
  background:none;color:var(--ink);
  border:1px solid var(--gold-dim);border-radius:4px;
  padding:3px 7px;cursor:pointer;font-family:inherit;font-size:11px;
}
.cbtn:hover{border-color:var(--gold);color:var(--gold)}
.cbtn svg{width:11px;height:11px}
.cbtn.icon-only{padding:3px 5px}
select,input[type=number]{
  background:var(--bg-card);color:var(--ink);
  border:1px solid var(--gold-dim);border-radius:4px;
  padding:2px 4px;font-family:inherit;font-size:11px;
}
input[type=color]{
  width:24px;height:22px;padding:0;border:1px solid var(--gold-dim);
  border-radius:4px;background:none;cursor:pointer;
}
#dirty{color:var(--gold);margin-left:auto;opacity:0;transition:opacity .2s}
#dirty.on{opacity:1}
.hint{color:var(--ink-dim)}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div id="app"><div id="tree"></div></div>

<div id="bar">
  <div class="bar-row">
    <span class="bar-label">檔案</span>
    <button class="cbtn" id="btnExport" title="匯出 JSON(可選擇儲存位置,例如 iCloud Drive)">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 10V2M5 5l3-3 3 3M2 10v3h12v-3"/></svg>匯出 JSON</button>
    <button class="cbtn" id="btnImport" title="匯入 JSON(從 iCloud Drive 或本機載入)">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v8M5 7l3 3 3-3M2 10v3h12v-3"/></svg>匯入 JSON</button>
    <button class="cbtn" id="btnText" title="匯出為純文字檔">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2h10M3 6h10M3 10h7M3 14h5"/></svg>匯出文字</button>
    <button class="cbtn" id="btnReset" title="清除全部,重新開始">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 4A6 6 0 1 0 14 8M13 1v3h-3"/></svg>重設</button>
    <span id="dirty" title="有未匯出的變更">● 未匯出</span>
  </div>
  <div class="bar-row">
    <span class="bar-label">樣式</span>
    <select id="selFont" title="字體">
      <option value='"PingFang TC","PingFang SC","Heiti TC",-apple-system,sans-serif'>PingFang TC</option>
      <option value='"Songti TC","Songti SC",serif'>宋體</option>
      <option value='"Kaiti TC","Kaiti SC",serif'>楷體</option>
      <option value='Georgia,serif'>Georgia</option>
      <option value='Menlo,monospace'>Menlo</option>
    </select>
    <input type="number" id="numSize" min="10" max="22" step="1" value="12" title="字級" style="width:44px">
    <input type="color" id="colGold" value="#C9A45C" title="線條/邊框顏色">
    <span class="bar-label" style="margin-left:10px">展開</span>
    <button class="cbtn icon-only" id="ex1" title="展開 1 層">1</button>
    <button class="cbtn icon-only" id="ex2" title="展開 2 層">2</button>
    <button class="cbtn icon-only" id="ex3" title="展開 3 層">3</button>
    <button class="cbtn icon-only" id="exAll" title="展開全部">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6l4 4 4-4M4 1l4 4 4-4" transform="translate(0,2)"/></svg></button>
    <button class="cbtn icon-only" id="coAll" title="收合全部">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 10l4-4 4 4M4 15l4-4 4 4" transform="translate(0,-2)"/></svg></button>
  </div>
</div>

<input type="file" id="fileIn" accept=".json,application/json" style="display:none">

<script>
/* ================= data ================= */
let uid = () => 'n' + Math.random().toString(36).slice(2, 9) + Date.now().toString(36);
let root = { id:'root', type:'folder', title:'根目錄', collapsed:false, children:[] };
let settings = { ff:document.querySelector('#selFont').value, fs:12, gold:'#C9A45C' };
let dirty = false;

function markDirty(v){ dirty = v; document.getElementById('dirty').classList.toggle('on', v);
  document.title = (v?'● ':'') + '文章卡片樹'; }

function find(node, id, parent){ 
  if(node.id===id) return {node, parent};
  for(const c of node.children||[]){ const r=find(c,id,node); if(r) return r; }
  return null;
}
function isDescendant(anc, id){
  for(const c of anc.children||[]){ if(c.id===id||isDescendant(c,id)) return true; } return false;
}

/* ================= icons ================= */
const IC = {
  folder:'<svg class="type-ic" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M1.5 3.5h4l1.5 2h7.5v7h-13z"/></svg>',
  article:'<svg class="type-ic" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M3.5 1.5h6l3 3v10h-9zM9.5 1.5v3h3"/></svg>',
  addArt:'<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 2h5l3 3v9H4zM10 8H6M8 6v4"/></svg>',
  addFold:'<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1.5 3.5h4l1.5 2h7.5v7h-13zM8 7.5v4M6 9.5h4"/></svg>',
  del:'<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2.5 4h11M6 4V2.5h4V4M4 4l.8 10h6.4L12 4M6.5 6.5v5M9.5 6.5v5"/></svg>',
  fmt:'<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 13L7 3h2l4 10M4.5 9.5h7"/></svg>'
};

/* ================= render ================= */
const treeEl = document.getElementById('tree');

function render(){
  treeEl.innerHTML = '';
  treeEl.appendChild(renderNode(root, true));
}

function renderNode(n, isRoot){
  const wrap = document.createElement('div'); wrap.className='node'; wrap.dataset.id=n.id;
  const row = document.createElement('div'); row.className='row';
  if(!isRoot){ row.draggable = true; }

  /* bullet */
  const hasBody = n.type==='folder' ? (n.children.length>0) : true;
  const b = document.createElement('span');
  b.className = 'bullet' + (hasBody ? (n.collapsed?' closed':'') : ' leaf');
  b.innerHTML = '<span class="dot"></span>';
  b.title = n.collapsed ? '展開' : '收合';
  b.onclick = () => { n.collapsed = !n.collapsed; markDirty(true); render(); };
  row.appendChild(b);

  /* type icon */
  const ic = document.createElement('span'); ic.innerHTML = IC[n.type]; row.appendChild(ic.firstChild);

  /* title — click to edit */
  const t = document.createElement('span');
  t.className='title'; t.textContent = n.title; t.contentEditable = 'true'; t.spellcheck=false;
  t.oninput = () => { n.title = t.textContent; markDirty(true); };
  t.onkeydown = e => { if(e.key==='Enter'){ e.preventDefault(); t.blur(); } };
  row.appendChild(t);

  /* hover actions */
  const acts = document.createElement('span'); acts.className='acts';
  if(n.type==='folder'){
    acts.appendChild(mkBtn(IC.addArt,'新增文章卡', ()=>{ 
      n.children.push({id:uid(),type:'article',title:'新文章',content:'',collapsed:false,fmtOn:false});
      n.collapsed=false; markDirty(true); render(); }));
    acts.appendChild(mkBtn(IC.addFold,'新增子資料夾', ()=>{
      n.children.push({id:uid(),type:'folder',title:'新資料夾',collapsed:false,children:[]});
      n.collapsed=false; markDirty(true); render(); }));
  }
  if(!isRoot){
    const d = mkBtn(IC.del,'刪除', ()=>{
      if(!confirm('刪除「'+(n.title||'未命名')+'」及其所有內容?')) return;
      const r = find(root, n.id); r.parent.children = r.parent.children.filter(c=>c.id!==n.id);
      markDirty(true); render(); });
    d.classList.add('danger'); acts.appendChild(d);
  }
  row.appendChild(acts);
  wrap.appendChild(row);

  /* drag & drop */
  if(!isRoot){
    row.addEventListener('dragstart', e=>{ e.dataTransfer.setData('text/plain', n.id); e.stopPropagation(); });
  }
  row.addEventListener('dragover', e=>{
    e.preventDefault(); e.stopPropagation();
    row.classList.remove('drag-over-into','drag-over-before','drag-over-after');
    const rect=row.getBoundingClientRect(), y=(e.clientY-rect.top)/rect.height;
    if(n.type==='folder' && y>.3 && y<.7) row.classList.add('drag-over-into');
    else if(y<=.5) row.classList.add('drag-over-before');
    else row.classList.add('drag-over-after');
  });
  row.addEventListener('dragleave', ()=> row.classList.remove('drag-over-into','drag-over-before','drag-over-after'));
  row.addEventListener('drop', e=>{
    e.preventDefault(); e.stopPropagation();
    const mode = row.classList.contains('drag-over-into')?'into':row.classList.contains('drag-over-before')?'before':'after';
    row.classList.remove('drag-over-into','drag-over-before','drag-over-after');
    const dragId = e.dataTransfer.getData('text/plain');
    if(!dragId || dragId===n.id) return;
    const src = find(root, dragId); if(!src) return;
    if(src.node.type==='folder' && (isDescendant(src.node, n.id))) return; /* 不可移入自身子孫 */
    if(isRoot && mode!=='into') return;
    src.parent.children = src.parent.children.filter(c=>c.id!==dragId);
    if(mode==='into'){ n.children.push(src.node); n.collapsed=false; }
    else{
      const tgt = find(root, n.id); const arr = tgt.parent.children;
      let idx = arr.findIndex(c=>c.id===n.id); if(mode==='after') idx++;
      arr.splice(idx,0,src.node);
    }
    markDirty(true); render();
  });

  /* body */
  if(!n.collapsed){
    if(n.type==='folder'){
      const kids=document.createElement('div'); kids.className='children';
      n.children.forEach(c=>kids.appendChild(renderNode(c,false)));
      wrap.appendChild(kids);
    }else{
      wrap.appendChild(renderCard(n));
    }
  }
  return wrap;
}

function mkBtn(svg, title, fn){
  const b=document.createElement('button'); b.className='ibtn'; b.title=title; b.innerHTML=svg;
  b.onclick=e=>{ e.stopPropagation(); fn(); }; return b;
}

function renderCard(n){
  const card=document.createElement('div'); card.className='card';
  const tools=document.createElement('div'); tools.className='card-tools'+(n.fmtOn?'':' hidden');
  const cmds=[['bold','<b>B</b>','粗體'],['italic','<i>I</i>','斜體'],['underline','<u>U</u>','底線'],
              ['insertUnorderedList','••','項目符號'],['removeFormat','⌫','清除格式']];
  cmds.forEach(([cmd,label,tip])=>{
    const b=document.createElement('button'); b.className='ibtn'; b.innerHTML=label; b.title=tip;
    b.onmousedown=e=>e.preventDefault(); /* 保留選取範圍 */
    b.onclick=()=>{ document.execCommand(cmd,false,null); };
    tools.appendChild(b);
  });
  card.appendChild(tools);

  const rich=document.createElement('div'); rich.className='rich'; rich.contentEditable='true'; rich.spellcheck=false;
  rich.innerHTML = n.content||'';
  rich.oninput = ()=>{ n.content = rich.innerHTML; markDirty(true); };
  card.appendChild(rich);

  /* 格式列切換鈕:置於卡片右上,滑入才顯示 */
  const fmtBtn=mkBtn(IC.fmt, n.fmtOn?'隱藏格式工具':'顯示格式工具', ()=>{ n.fmtOn=!n.fmtOn; render(); });
  fmtBtn.style.cssText='position:absolute;top:4px;right:4px;opacity:0';
  card.style.position='relative';
  card.onmouseenter=()=>fmtBtn.style.opacity=1;
  card.onmouseleave=()=>fmtBtn.style.opacity=0;
  card.appendChild(fmtBtn);
  return card;
}

/* ================= expand / collapse levels ================= */
function setDepth(n, depth, limit, expandArticles){
  if(n.type==='folder'){
    n.collapsed = depth >= limit;
    n.children.forEach(c=>setDepth(c, depth+1, limit, expandArticles));
  }else{
    n.collapsed = !expandArticles;
  }
}
document.getElementById('ex1').onclick=()=>{ setDepth(root,0,1,false); render(); };
document.getElementById('ex2').onclick=()=>{ setDepth(root,0,2,false); render(); };
document.getElementById('ex3').onclick=()=>{ setDepth(root,0,3,false); render(); };
document.getElementById('exAll').onclick=()=>{ setDepth(root,0,Infinity,true); render(); };
document.getElementById('coAll').onclick=()=>{ setDepth(root,0,0,false); root.collapsed=false;
  root.children.forEach(c=>{ if(c.type==='article') c.collapsed=true; }); render(); };

/* ================= file ops ================= */
async function saveFile(content, suggested, mime, desc, ext){
  if(window.showSaveFilePicker){
    try{
      const h = await showSaveFilePicker({suggestedName:suggested,
        types:[{description:desc, accept:{[mime]:[ext]}}]});
      const w = await h.createWritable(); await w.write(content); await w.close();
      return true;
    }catch(e){ if(e.name==='AbortError') return false; }
  }
  /* Safari 等瀏覽器:下載後可自行移至 iCloud Drive */
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type:mime}));
  a.download=suggested; a.click(); URL.revokeObjectURL(a.href);
  return true;
}
document.getElementById('btnExport').onclick=async()=>{
  const ok = await saveFile(JSON.stringify({settings, tree:root}, null, 2),
    'article-tree.json','application/json','JSON 檔','.json');
  if(ok) markDirty(false);
};
document.getElementById('btnImport').onclick=()=>document.getElementById('fileIn').click();
document.getElementById('fileIn').onchange=e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{
      const d=JSON.parse(r.result);
      root = d.tree || d;
      if(d.settings){ settings=d.settings; applySettings(); }
      markDirty(false); render();
    }catch(err){ alert('無法解析此 JSON 檔:'+err.message); } };
  r.readAsText(f); e.target.value='';
};
function toText(n, depth){
  const pad='  '.repeat(depth);
  let out = pad + (n.type==='folder'?'▸ ':'· ') + (n.title||'未命名') + '\n';
  if(n.type==='article' && n.content){
    const tmp=document.createElement('div'); tmp.innerHTML=n.content;
    tmp.querySelectorAll('li').forEach(li=>li.textContent='• '+li.textContent+'\n');
    tmp.querySelectorAll('div,p,br').forEach(el=>{ if(el.tagName==='BR') el.replaceWith('\n'); else el.append('\n'); });
    out += tmp.textContent.split('\n').filter(s=>s.trim()).map(s=>pad+'  '+s.trim()).join('\n')+'\n';
  }
  (n.children||[]).forEach(c=> out += toText(c, depth+1));
  return out;
}
document.getElementById('btnText').onclick=()=> saveFile(toText(root,0),'article-tree.txt','text/plain','文字檔','.txt');
document.getElementById('btnReset').onclick=()=>{
  if(!confirm('清除全部內容並重新開始?此動作無法復原(建議先匯出 JSON)。')) return;
  root={id:'root',type:'folder',title:'根目錄',collapsed:false,children:[]};
  markDirty(false); render();
};

/* ================= style controls ================= */
function applySettings(){
  document.documentElement.style.setProperty('--ff', settings.ff);
  document.documentElement.style.setProperty('--fs', settings.fs+'px');
  document.documentElement.style.setProperty('--gold', settings.gold);
  const c=settings.gold, r=parseInt(c.slice(1,3),16), g=parseInt(c.slice(3,5),16), bl=parseInt(c.slice(5,7),16);
  document.documentElement.style.setProperty('--gold-dim', `rgba(${r},${g},${bl},.35)`);
  document.documentElement.style.setProperty('--gold-halo', `rgba(${r},${g},${bl},.22)`);
  document.getElementById('selFont').value=settings.ff;
  document.getElementById('numSize').value=settings.fs;
  document.getElementById('colGold').value=settings.gold;
}
document.getElementById('selFont').onchange=e=>{ settings.ff=e.target.value; applySettings(); markDirty(true); };
document.getElementById('numSize').onchange=e=>{ settings.fs=+e.target.value||12; applySettings(); markDirty(true); };
document.getElementById('colGold').oninput=e=>{ settings.gold=e.target.value; applySettings(); markDirty(true); };

/* 關閉前提醒未匯出 */
window.addEventListener('beforeunload', e=>{ if(dirty){ e.preventDefault(); e.returnValue=''; } });

/* ================= init:示範內容 ================= */
root.children=[
  {id:uid(),type:'folder',title:'策略思考',collapsed:false,children:[
    {id:uid(),type:'article',title:'第一性原理',collapsed:false,fmtOn:false,
     content:'<ul><li>拆解至不可再分的基本事實</li><li>由基本事實重新推導,而非類比既有方案</li><li>適用於高不確定性決策</li></ul>'},
    {id:uid(),type:'article',title:'槓桿點分析',collapsed:true,fmtOn:false,
     content:'<ul><li>找出系統中投入最少,影響最大的節點</li><li>優先改變結構,而非參數</li></ul>'}
  ]},
  {id:uid(),type:'folder',title:'閱讀筆記',collapsed:true,children:[]}
];
applySettings(); render();
</script>
</body>
</html>
